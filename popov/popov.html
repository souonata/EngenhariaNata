<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- App privado (chat com backend local via tunnel HTTPS) -->
    <meta name="robots" content="noindex, nofollow, noarchive">

    <!-- Meta tags para DESABILITAR cache - sempre carrega arquivos atualizados -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- CSP local do app (pode ser reforçada/ajustada via popov/.htaccess) -->
    <!-- Nota: se o servidor aplicar CSP por header, esta meta NÃO substitui o header. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: http://localhost:8000 http://127.0.0.1:8000; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">

    <!-- SEO Meta Tags -->
    <title>Popov IA (Local) | Engenharia NATA</title>
    <meta name="description" content="Popov IA com Ollama local e streaming seguro via FastAPI.">
    <meta name="author" content="Engenharia NATA">

    <!-- Estilos compartilhados -->
    <link rel="stylesheet" href="../assets/css/shared-styles.css?v=1.0.3">
    <link rel="stylesheet" href="popov-styles.css?v=1.0.3">
</head>
<body>
    <!-- ========================================== -->
    <!-- SELETOR DE IDIOMA (PADRÃO GLOBAL - FORA DO CONTAINER) -->
    <!-- ========================================== -->
    <div class="language-selector">
        <button id="btnPortugues" class="lang-btn" data-lang="pt-BR" data-i18n-aria="aria.langPt" data-i18n-title="titles.langPt">
            <span class="flag" aria-hidden="true">🇧🇷</span>
            <span class="lang-text">PT</span>
        </button>
        <button id="btnItaliano" class="lang-btn" data-lang="it-IT" data-i18n-aria="aria.langIt" data-i18n-title="titles.langIt">
            <span class="flag" aria-hidden="true">🇮🇹</span>
            <span class="lang-text">IT</span>
        </button>
    </div>

    <div class="container popov-container">
        <header class="popov-header">
            <h1 data-i18n="app.title">Popov IA Local</h1>
            <p class="subtitulo" data-i18n="app.subtitle">Ollama gpt-oss:20b com streaming seguro</p>
        </header>

        <section class="card popov-card">
            <div class="popov-card-header">
                <h2 class="popov-card-title" data-i18n="chat.title">Conversa</h2>

                <div class="popov-actions">
                    <button id="btnConfigurarApi" class="btn btn-secondary" type="button" data-i18n="buttons.configureApi">
                        Configurar API
                    </button>
                    <button id="btnLimparConversa" class="btn btn-secondary" type="button" data-i18n="buttons.clearConversation">
                        Limpar conversa
                    </button>
                </div>
            </div>

            <div id="statusBox" class="status-box" role="status" aria-live="polite">
                <strong class="status-title" id="statusTitle" data-i18n="status.waitingTitle">Aguardando configuração...</strong>
                <div class="status-text" id="statusText" data-i18n="status.waitingText">
                    Defina URL da API e token Bearer para iniciar.
                </div>
            </div>

            <div id="chatContainer" class="chat-shell" aria-live="polite" aria-label="Chat Popov IA"></div>

            <form id="chatForm" class="chat-form" autocomplete="off">
                <div class="model-selector-row">
                    <label for="modelSelect" class="model-select-label" data-i18n="chat.modelLabel">Modelo</label>
                    <select id="modelSelect" class="model-select" aria-label="Selecionar modelo">
                        <option value="" data-i18n="chat.modelDefault">Padrao (backend)</option>
                        <option value="hunter-alpha" data-i18n="chat.modelHunter">Hunter-Alpha</option>
                        <option value="healer-alpha" data-i18n="chat.modelHealer">Healer-Alpha</option>
                    </select>
                </div>
                <label class="visually-hidden" for="chatInput" data-i18n="chat.inputLabel">Mensagem</label>
                <textarea id="chatInput" rows="3" maxlength="4000" data-i18n-placeholder="chat.inputPlaceholder" placeholder="Digite sua mensagem"></textarea>
                <div class="chat-actions">
                    <button id="btnParar" class="btn btn-secondary" type="button" data-i18n="buttons.stop" disabled>
                        Parar
                    </button>
                    <button id="btnEnviar" class="btn btn-primary" type="submit" data-i18n="buttons.send">
                        Enviar
                    </button>
                </div>
            </form>
        </section>

    </div>

    <footer>
        <p data-i18n="footer.texto">Popov IA Local - Engenharia NATA @ 2026</p>
    </footer>

    <!-- Botão de retorno à tela inicial -->
    <a href="../index.html" class="home-button-fixed" data-i18n-aria="aria.home">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <script type="module" src="popov-script.js?v=1.0.5"></script>
</body>
</html>
