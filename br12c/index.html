<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BR 12C Niobium Emulator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="workspace" aria-label="Emulador BR 12C Niobium">
      <section class="calculator-stage" aria-label="Calculadora BR 12C Niobium">
        <div class="stage-controls" role="toolbar" aria-label="Ferramentas da calculadora">
          <button class="stage-tool hold-tool" type="button" id="holdModeBtn" aria-pressed="false" aria-label="Modo Segurar: trava teclas para usar em sequência">
            <span class="stage-tool-icon" aria-hidden="true">🔒</span>
            <span class="stage-tool-text">
              <span class="stage-tool-title">Modo Segurar</span>
              <span class="stage-tool-desc">Trava teclas (f, g…) para tocar uma de cada vez. Toque de novo na tecla travada para soltar.</span>
            </span>
          </button>

          <button class="stage-tool guide-tool" type="button" data-action="guide" aria-haspopup="dialog" aria-controls="guideOverlay" aria-label="Abrir o guia do usuário (manual)">
            <span class="stage-tool-icon" aria-hidden="true">📖</span>
            <span class="stage-tool-text">
              <span class="stage-tool-title">Guia do usuário</span>
              <span class="stage-tool-desc">Abre o manual da calculadora (PDF) ao lado da tela.</span>
            </span>
          </button>

          <a class="stage-tool test-tool" href="./tests/visual.html" aria-label="Abrir o sistema de testes ao vivo">
            <span class="stage-tool-icon" aria-hidden="true">🧪</span>
            <span class="stage-tool-text">
              <span class="stage-tool-title">Sistema de testes</span>
              <span class="stage-tool-desc">Roda os exemplos do guia ao vivo na calculadora.</span>
            </span>
          </a>
        </div>

        <section class="calculator" aria-label="BR 12C Niobium">
          <div class="faceplate">
            <div class="display-strip">
              <div class="brand-block" aria-label="br 12c niobium financial calculator">
                <span class="hp-mark">br</span>
                <span class="model-name">12c niobium</span>
                <span class="model-kind">financial calculator</span>
              </div>

              <div class="lcd" role="status" aria-live="polite">
                <div class="lcd-indicators">
                  <span id="shiftIndicator"></span>
                  <span id="modeIndicator">RPN</span>
                  <span id="angleIndicator"></span>
                  <span id="prgmIndicator"></span>
                  <span id="dmyIndicator"></span>
                  <span id="cIndicator"></span>
                  <span id="pendingIndicator"></span>
                </div>
                <output id="display">0.00</output>
              </div>
            </div>

            <div class="keyboard" id="keyboard" aria-label="Teclado"></div>
          </div>
        </section>
      </section>

      <aside class="register-panel" aria-label="Registradores">
        <section class="panel-block" aria-label="Pilha">
          <div class="panel-title">Pilha</div>
          <dl class="register-grid">
            <div><dt>T</dt><dd data-stack="t">0.00</dd></div>
            <div><dt>Z</dt><dd data-stack="z">0.00</dd></div>
            <div><dt>Y</dt><dd data-stack="y">0.00</dd></div>
            <div><dt>X</dt><dd data-stack="x">0.00</dd></div>
          </dl>
        </section>

        <section class="panel-block" aria-label="Financeiro" data-panel="tvm">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <span>TVM</span>
            <span class="panel-chevron" aria-hidden="true">▾</span>
          </button>
          <dl class="register-grid tvm-grid">
            <div><dt>n</dt><dd data-tvm="n">--</dd></div>
            <div><dt>i</dt><dd data-tvm="i">--</dd></div>
            <div><dt>PV</dt><dd data-tvm="PV">--</dd></div>
            <div><dt>PMT</dt><dd data-tvm="PMT">--</dd></div>
            <div><dt>FV</dt><dd data-tvm="FV">--</dd></div>
            <div><dt>M</dt><dd data-memory>0.00</dd></div>
          </dl>
        </section>

        <section class="panel-block" aria-label="Estado" data-panel="estado">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <span>Estado</span>
            <span class="panel-chevron" aria-hidden="true">▾</span>
          </button>
          <dl class="register-grid">
            <div><dt>Modo</dt><dd data-status="mode">RPN</dd></div>
            <div><dt>Shift</dt><dd data-status="shift">--</dd></div>
            <div><dt>FIX</dt><dd data-status="fixed">2</dd></div>
            <div><dt>Fluxo</dt><dd data-status="begin">END</dd></div>
            <div><dt>Op</dt><dd data-status="pending">--</dd></div>
          </dl>
        </section>
      </aside>
    </main>

    <div class="guide-overlay" id="guideOverlay" role="complementary" aria-labelledby="guideTitle" hidden>
      <div class="guide-resizer" id="guideResizer" role="separator" aria-label="Ajustar a divisória do guia (use as setas)" tabindex="0"></div>
      <div class="guide-modal">
        <header class="guide-modal-bar">
          <span class="guide-modal-title" id="guideTitle">📘 Guia do usuário — HP 12C Platinum (EN)</span>
          <a class="guide-modal-open" href="./assets/hp12cplatinum-ug-en.pdf" target="_blank" rel="noopener noreferrer">Abrir em nova aba ↗</a>
          <button class="guide-modal-close" type="button" data-action="guide-close" aria-label="Fechar guia">✕</button>
        </header>
        <div class="guide-modal-body">
          <iframe class="guide-frame" id="guideFrame" title="Guia do usuário HP 12C Platinum (PDF)" data-src="./assets/hp12cplatinum-ug-en.pdf#view=FitH"></iframe>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
    <script src="./guide.js"></script>
    <script src="./panels.js"></script>
  </body>
</html>
