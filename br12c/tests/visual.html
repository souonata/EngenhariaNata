<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robô do guia — BR 12C Niobium</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1c2620;
        color: #e8eae6;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 8px 12px;
        background: #11160f;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid #2a3a2e;
      }
      header h1 {
        font-size: 1rem;
        margin: 0 6px 0 0;
        color: #f2c64d;
        white-space: nowrap;
      }
      select,
      button,
      label,
      input {
        font: inherit;
      }
      button {
        background: #2a3a2e;
        color: #e8eae6;
        border: 1px solid #3c5142;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        border-color: #5a7a64;
      }
      button.primary {
        background: #2e7d4f;
        border-color: #3fa06a;
      }
      button.primary:hover:not(:disabled) {
        background: #36905c;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      a.voltar {
        background: #3a2e11;
        border: 1px solid #6a531e;
        color: #f2c64d;
        border-radius: 6px;
        padding: 6px 10px;
        text-decoration: none;
        font-weight: 700;
        white-space: nowrap;
      }
      a.voltar:hover {
        background: #4a3a16;
      }
      .sep {
        width: 1px;
        align-self: stretch;
        background: #2a3a2e;
        margin: 0 2px;
      }
      /* Segmentado Auto/Manual */
      .modo-seg {
        display: inline-flex;
        border: 1px solid #3c5142;
        border-radius: 6px;
        overflow: hidden;
      }
      .modo-seg button {
        border: 0;
        border-radius: 0;
        padding: 6px 12px;
        background: #1c2620;
      }
      .modo-seg button.active {
        background: #2e7d4f;
        color: #fff;
      }
      label.vel {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        color: #b9c4ba;
        white-space: nowrap;
      }
      #status {
        margin-left: auto;
        font-weight: 700;
        color: #b9e5f1;
        white-space: nowrap;
      }
      #tecla {
        color: #f2c64d;
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 280px;
      }
      #wrap {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      /* Painel 1 — árvore + busca */
      #tree {
        width: 290px;
        flex: none;
        display: flex;
        flex-direction: column;
        background: #141a12;
        border-right: 1px solid #2a3a2e;
        min-height: 0;
      }
      .busca-box {
        padding: 8px;
        border-bottom: 1px solid #2a3a2e;
      }
      #busca {
        width: 100%;
        padding: 7px 9px;
        border-radius: 6px;
        border: 1px solid #3c5142;
        background: #1c2620;
        color: #e8eae6;
      }
      #arvore {
        flex: 1;
        overflow: auto;
        padding: 6px 6px 16px;
      }
      #arvore details {
        margin: 0 0 2px;
      }
      #arvore summary {
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 5px;
        font-size: 0.83rem;
        font-weight: 700;
        color: #cfe0cf;
      }
      #arvore summary:hover {
        background: #1f2a1c;
      }
      #arvore .secao {
        margin-left: 8px;
      }
      #arvore .secao > summary {
        font-weight: 600;
        color: #a9c0a9;
        font-size: 0.8rem;
      }
      .leaf {
        display: block;
        width: calc(100% - 16px);
        margin: 2px 0 2px 16px;
        padding: 5px 8px;
        text-align: left;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 5px;
        color: #d7e3d7;
        font-size: 0.8rem;
        line-height: 1.25;
        white-space: normal;
      }
      .leaf:hover {
        background: #1f2a1c;
        border-color: #2a3a2e;
      }
      .leaf.active {
        background: #2e7d4f;
        border-color: #3fa06a;
        color: #fff;
        font-weight: 600;
      }
      .vazio {
        color: #7d8a7d;
        font-size: 0.82rem;
        padding: 10px;
      }
      /* Painel 2 — calculadora */
      #calcBox {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        background: #22301f;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      /* Painel 3 — objetivo + log */
      #side {
        width: 400px;
        max-width: 42vw;
        flex: none;
        display: flex;
        flex-direction: column;
        background: #161d14;
        border-left: 1px solid #2a3a2e;
        min-height: 0;
      }
      #objetivo {
        padding: 12px;
        border-bottom: 1px solid #2a3a2e;
        background: #182115;
      }
      #objetivo .rotulo {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8fb89a;
        font-weight: 800;
        margin-bottom: 4px;
      }
      #objetivo .titulo {
        font-weight: 800;
        font-size: 0.98rem;
        color: #f3f6f1;
        margin-bottom: 4px;
      }
      #objetivo .texto {
        font-size: 0.86rem;
        line-height: 1.4;
        color: #cdd8cc;
      }
      #objetivo .meta {
        margin-top: 6px;
        font-size: 0.72rem;
        color: #7d8a7d;
      }
      #objetivo .passo {
        margin-top: 6px;
        font-size: 0.74rem;
        color: #9aa79a;
      }
      #log {
        flex: 1;
        overflow: auto;
        padding: 8px 10px 16px;
      }
      .linha {
        padding: 6px 8px;
        border-radius: 6px;
        margin-bottom: 5px;
        font-size: 0.82rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #243021;
      }
      .linha.ok {
        background: rgba(46, 125, 79, 0.18);
        border-color: rgba(63, 160, 106, 0.4);
      }
      .linha.fail {
        background: rgba(210, 70, 70, 0.22);
        border-color: rgba(210, 70, 70, 0.5);
      }
      /* Linha PENDENTE: mostra a nota e as teclas ANTES de rodar. */
      .linha.pendente {
        background: rgba(104, 199, 229, 0.08);
        border-color: rgba(104, 199, 229, 0.5);
        border-style: dashed;
      }
      .linha.pendente .got {
        color: #68c7e5;
      }
      .linha .nota {
        color: #b6c3b4;
        font-size: 0.8rem;
        line-height: 1.35;
        margin-bottom: 4px;
      }
      .linha .baixo {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }
      .keys {
        color: #b9e5f1;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
      }
      .got {
        font-family: ui-monospace, monospace;
        white-space: nowrap;
        font-size: 0.78rem;
      }
      .resumo {
        font-weight: 800;
        margin: 8px 0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="voltar" href="../index.html" id="lnkVoltar">← Calculadora</a>
      <h1 id="hTitulo">🤖 Robô do guia</h1>

      <span class="sep"></span>

      <div class="modo-seg" id="modoSeg">
        <button data-modo="auto" class="active" type="button" id="btnModoAuto">Automático</button>
        <button data-modo="manual" type="button" id="btnModoManual">Manual</button>
      </div>

      <label class="vel"><span id="lblVel">Velocidade</span>
        <input id="vel" type="range" min="200" max="2200" value="900" step="100" />
      </label>

      <span class="grp-auto">
        <button id="play" class="primary" type="button">▶ Tocar</button>
        <button id="playAll" type="button">▶▶ Tocar tudo</button>
      </span>
      <span class="grp-manual" style="display: none">
        <button id="proxTecla" type="button">Próxima tecla →</button>
        <button id="proxLinha" type="button">Próxima linha ⤵</button>
      </span>
      <button id="reiniciar" type="button">↻ Reiniciar</button>
      <button id="parar" type="button" disabled>⏹ Parar</button>

      <span id="tecla"></span>
      <span id="status"></span>
    </header>

    <div id="wrap">
      <div id="tree">
        <div class="busca-box">
          <input id="busca" type="search" placeholder="Buscar exemplo…" autocomplete="off" />
        </div>
        <div id="arvore"></div>
      </div>

      <div id="calcBox"><iframe id="calc" title="Calculadora" src="../index.html"></iframe></div>

      <div id="side">
        <div id="objetivo"></div>
        <div id="log"></div>
      </div>
    </div>

    <script type="module">
      import { arvore, achatar, casa } from "./guia-arvore.js";
      import { criarEngine } from "./robo-engine.js";
      import { lerIdioma, t, bi } from "./robo-i18n.js";

      // ---- estado da UI ----
      let idioma = lerIdioma();
      let modo = "auto"; // "auto" | "manual"
      let pararGeral = false;
      const flat = achatar(); // índice = data-idx das folhas
      let idxAtual = -1;
      // Linhas mostradas no log. Cada item: { linhaIdx, linha, r, el }. r=null
      // enquanto a linha ainda NÃO rodou (linha "pendente": mostra a nota e as
      // teclas ANTES da operação acontecer). Ao rodar, r recebe o resultado.
      let linhasRender = [];
      let resumoFinal = null; // {ok, total} quando o exemplo termina

      const $ = (id) => document.getElementById(id);
      const elArvore = $("arvore");
      const elBusca = $("busca");
      const elLog = $("log");
      const elObjetivo = $("objetivo");
      const elStatus = $("status");
      const elTecla = $("tecla");
      const vel = $("vel");
      const frame = $("calc");

      function el(tag, attrs = {}, txt) {
        const n = document.createElement(tag);
        for (const k in attrs) {
          if (k === "open") {
            if (attrs[k]) n.open = true;
          } else if (attrs[k] != null) {
            n.setAttribute(k, attrs[k]);
          }
        }
        if (txt != null) n.textContent = txt;
        return n;
      }
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      // ---- engine ----
      const engine = criarEngine({
        frame,
        vel,
        callbacks: {
          onCarregado(ex) {
            linhasRender = [];
            resumoFinal = null;
            elLog.innerHTML = "";
            renderObjetivo(ex);
            setStatus(t(idioma, "pronto"));
          },
          onLinha(linhaIdx, linha, r) {
            completarLinha(linhaIdx, linha, r); // preenche o resultado da linha
          },
          onFim(ok, total) {
            resumoFinal = { ok, total };
            renderResumo(ok, total);
            setStatus(`${ok}/${total}`);
          },
          onProgresso(p) {
            // Ao chegar numa linha nova (a próxima tecla pertence a ela), mostra
            // a linha PENDENTE (nota + teclas) antes de ela rodar.
            const ex = engine.exAtual();
            if (ex && p.info && p.info.linhaIdx >= 0) {
              mostrarPendente(p.info.linhaIdx, ex.linhas[p.info.linhaIdx]);
            }
            atualizarPasso(p);
            atualizarBotoes(p);
          },
          onTecla(rotulo) {
            elTecla.textContent = "⌨ " + rotulo;
          },
          onStatus(chave) {
            setStatus(t(idioma, chave));
          },
        },
      });

      // ---- render: árvore ----
      function renderArvore() {
        const filtro = elBusca.value;
        elArvore.innerHTML = "";
        let idx = -1;
        let algumVisivel = false;
        for (const parte of arvore) {
          const dParte = el("details", { open: true });
          dParte.appendChild(el("summary", {}, bi(parte.titulo, idioma)));
          let parteTem = false;
          for (const sec of parte.secoes) {
            const dSec = el("details", { class: "secao", open: !!filtro });
            dSec.appendChild(el("summary", {}, bi(sec.titulo, idioma)));
            let secTem = false;
            for (const ex of sec.exemplos) {
              idx += 1;
              if (filtro && !casa(ex, filtro)) continue;
              const rot = bi(ex.titulo, idioma, ex.nome);
              const b = el("button", { class: "leaf", "data-idx": String(idx), type: "button" }, rot);
              if (idx === idxAtual) b.classList.add("active");
              dSec.appendChild(b);
              secTem = true;
            }
            if (secTem) {
              dParte.appendChild(dSec);
              parteTem = true;
              algumVisivel = true;
            }
          }
          if (parteTem) elArvore.appendChild(dParte);
        }
        if (!algumVisivel) {
          elArvore.appendChild(el("div", { class: "vazio" }, t(idioma, "semResultados")));
        }
      }

      // ---- render: objetivo ----
      function renderObjetivo(ex) {
        elObjetivo.innerHTML = "";
        if (!ex) {
          elObjetivo.appendChild(el("div", { class: "titulo" }, t(idioma, "selecioneTitulo")));
          elObjetivo.appendChild(el("div", { class: "texto" }, t(idioma, "selecioneTexto")));
          elObjetivo.appendChild(el("div", { class: "passo" }, t(idioma, "dica")));
          return;
        }
        elObjetivo.appendChild(el("div", { class: "rotulo" }, t(idioma, "objetivoLabel")));
        const tit = bi(ex.titulo, idioma, ex.nome);
        elObjetivo.appendChild(el("div", { class: "titulo" }, tit));
        const obj = bi(ex.objetivo, idioma, "");
        if (obj) elObjetivo.appendChild(el("div", { class: "texto" }, obj));
        const sec = ex._sec ? bi(ex._sec.titulo, idioma) : "";
        elObjetivo.appendChild(el("div", { class: "meta" }, sec ? sec + " · " + ex.nome : ex.nome));
        elObjetivo.appendChild(el("div", { class: "passo", id: "passoInfo" }));
      }

      // ---- render: linha do log (pendente -> concluída) ----
      // Desenha/atualiza o elemento de uma linha conforme seu estado (entry.r).
      function pintarLinha(entry) {
        const div = entry.el;
        div.innerHTML = "";
        const r = entry.r;
        div.className = "linha " + (r ? (r.ok ? "ok" : "fail") : "pendente");
        const nota = bi(entry.linha.nota, idioma, "");
        if (nota) div.appendChild(el("div", { class: "nota" }, nota));
        const baixo = el("div", { class: "baixo" });
        baixo.appendChild(el("span", { class: "keys" }, entry.linha.keys.join(" ")));
        const got = el("span", { class: "got" });
        got.textContent = r
          ? r.atual + " " + (r.ok ? "✓" : "✗ (" + t(idioma, "esperado") + " " + r.esperado + ")")
          : "▸ " + t(idioma, "pressionar");
        baixo.appendChild(got);
        div.appendChild(baixo);
      }

      // Cria a linha PENDENTE (antes de rodar), se ainda não existir.
      function mostrarPendente(linhaIdx, linha) {
        if (linhasRender.some((e) => e.linhaIdx === linhaIdx)) return;
        const entry = { linhaIdx, linha, r: null, el: el("div") };
        linhasRender.push(entry);
        elLog.appendChild(entry.el);
        pintarLinha(entry);
        entry.el.scrollIntoView({ block: "nearest" });
      }

      // Preenche o resultado quando a linha roda (garante a linha se faltar).
      function completarLinha(linhaIdx, linha, r) {
        let entry = linhasRender.find((e) => e.linhaIdx === linhaIdx);
        if (!entry) {
          entry = { linhaIdx, linha, r: null, el: el("div") };
          linhasRender.push(entry);
          elLog.appendChild(entry.el);
        }
        entry.r = r;
        pintarLinha(entry);
        entry.el.scrollIntoView({ block: "nearest" });
      }

      function renderResumo(ok, total) {
        const r = el("div", { class: "resumo" });
        r.textContent = `${ok}/${total} ${ok === total ? t(idioma, "tudoCerto") : t(idioma, "comFalhas")}`;
        elLog.appendChild(r);
        r.scrollIntoView({ block: "nearest" });
      }

      // re-pinta o painel inteiro (ao trocar idioma) sem mexer no run.
      function repintar() {
        renderObjetivo(engine.exAtual());
        elLog.innerHTML = "";
        for (const entry of linhasRender) {
          entry.el = el("div");
          elLog.appendChild(entry.el);
          pintarLinha(entry);
        }
        if (resumoFinal) renderResumo(resumoFinal.ok, resumoFinal.total);
        if (engine.exAtual()) atualizarPasso(engine.estadoPasso());
      }

      // ---- indicadores de passo/status ----
      function setStatus(txt) {
        elStatus.textContent = txt;
      }
      function atualizarPasso(p) {
        const box = $("passoInfo");
        if (!box) return;
        if (!p || p.fim || !p.info) {
          box.textContent = engine.exAtual() ? t(idioma, "fim") : "";
          elTecla.textContent = "";
          return;
        }
        box.textContent = `${t(idioma, "passo")} ${p.ptr + 1} ${t(idioma, "de")} ${p.total} — ${t(idioma, "proxima")}: ${p.info.rotulo}`;
      }
      function atualizarBotoes(p) {
        const fim = p ? p.fim : true;
        const temEx = !!engine.exAtual();
        $("proxTecla").disabled = !temEx || fim;
        $("proxLinha").disabled = !temEx || fim;
        $("reiniciar").disabled = !temEx;
        $("play").disabled = !temEx || fim;
      }

      // ---- ações ----
      async function selecionar(idx) {
        pararGeral = false;
        idxAtual = idx;
        marcarFolhaAtiva();
        $("parar").disabled = false;
        await engine.carregar(flat[idx]);
        $("parar").disabled = true;
      }
      function marcarFolhaAtiva() {
        elArvore.querySelectorAll(".leaf").forEach((b) => {
          b.classList.toggle("active", Number(b.dataset.idx) === idxAtual);
        });
      }

      async function tocar() {
        if (idxAtual < 0) return;
        pararGeral = false;
        $("parar").disabled = false;
        if (engine.noFim()) await engine.carregar(flat[idxAtual]);
        await engine.tocarAuto();
        $("parar").disabled = true;
      }

      async function tocarTudo() {
        pararGeral = false;
        $("parar").disabled = false;
        for (let i = 0; i < flat.length; i += 1) {
          if (pararGeral) break;
          idxAtual = i;
          marcarFolhaAtiva();
          await engine.carregar(flat[i]);
          if (pararGeral) break;
          await engine.tocarAuto();
          if (pararGeral || !engine.noFim()) break;
          await sleep(650);
        }
        $("parar").disabled = true;
      }

      function parar() {
        pararGeral = true;
        engine.pararTudo();
        setStatus(t(idioma, "parado"));
      }

      // ---- wiring ----
      elArvore.addEventListener("click", (e) => {
        const b = e.target.closest(".leaf");
        if (!b) return;
        selecionar(Number(b.dataset.idx));
      });
      elBusca.addEventListener("input", renderArvore);
      // Guarda: um passo manual por vez (evita cliques rápidos se sobreporem).
      let ocupado = false;
      async function passoManual(fn) {
        if (ocupado) return;
        ocupado = true;
        try {
          await fn();
        } finally {
          ocupado = false;
        }
      }

      $("play").onclick = tocar;
      $("playAll").onclick = tocarTudo;
      $("parar").onclick = parar;
      $("reiniciar").onclick = () => idxAtual >= 0 && selecionar(idxAtual);
      $("proxTecla").onclick = () => passoManual(() => engine.proximaTecla());
      $("proxLinha").onclick = () => passoManual(() => engine.proximaLinha());

      $("modoSeg").addEventListener("click", (e) => {
        const b = e.target.closest("button[data-modo]");
        if (!b) return;
        modo = b.dataset.modo;
        document.querySelectorAll("#modoSeg button").forEach((x) => x.classList.toggle("active", x === b));
        document.querySelector(".grp-auto").style.display = modo === "auto" ? "" : "none";
        document.querySelector(".grp-manual").style.display = modo === "manual" ? "" : "none";
      });

      // O idioma é escolhido na própria calculadora (moldura PT/IT no iframe), que
      // salva em sessionStorage e avisa o pai por postMessage. O robô só SEGUE.
      window.addEventListener("message", (e) => {
        if (e.source !== frame.contentWindow) return;
        const d = e.data;
        if (!d || d.tipo !== "engnata:idioma" || !d.idioma || d.idioma === idioma) return;
        idioma = d.idioma;
        aplicarTextosUI();
        renderArvore();
        repintar();
      });

      // ---- textos da UI (bilíngue) ----
      function aplicarTextosUI() {
        document.documentElement.lang = idioma;
        $("lnkVoltar").textContent = t(idioma, "voltar");
        $("hTitulo").textContent = t(idioma, "titulo");
        $("lblVel").textContent = t(idioma, "velocidade");
        $("btnModoAuto").textContent = t(idioma, "auto");
        $("btnModoManual").textContent = t(idioma, "manual");
        $("play").textContent = t(idioma, "tocar");
        $("playAll").textContent = t(idioma, "tocarTudo");
        $("proxTecla").textContent = t(idioma, "proximaTecla");
        $("proxLinha").textContent = t(idioma, "proximaLinha");
        $("reiniciar").textContent = t(idioma, "reiniciar");
        $("parar").textContent = t(idioma, "parar");
        elBusca.placeholder = t(idioma, "busca");
      }

      // ---- boot ----
      aplicarTextosUI();
      renderArvore();
      renderObjetivo(null);
      atualizarBotoes(null);
    </script>
  </body>
</html>
