<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robô do guia — BR 12C Niobium</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1c2620;
        color: #e8eae6;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 14px;
        background: #11160f;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid #2a3a2e;
      }
      header h1 {
        font-size: 1rem;
        margin: 0 8px 0 0;
        color: #f2c64d;
      }
      select,
      button,
      label,
      input {
        font: inherit;
      }
      select,
      button {
        background: #2a3a2e;
        color: #e8eae6;
        border: 1px solid #3c5142;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }
      button.primary {
        background: #2e7d4f;
        border-color: #3fa06a;
      }
      a.voltar {
        background: #3a2e11;
        border: 1px solid #6a531e;
        color: #f2c64d;
        border-radius: 6px;
        padding: 6px 10px;
        text-decoration: none;
        font-weight: 700;
        white-space: nowrap;
      }
      a.voltar:hover {
        background: #4a3a16;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-left: auto;
        font-weight: 700;
        color: #b9e5f1;
      }
      #wrap {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #calcBox {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        background: #22301f;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      #side {
        width: 400px;
        max-width: 44vw;
        overflow: auto;
        background: #161d14;
        border-left: 1px solid #2a3a2e;
        padding: 10px;
      }
      .linha {
        padding: 6px 8px;
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 0.84rem;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .ok {
        background: rgba(46, 125, 79, 0.25);
      }
      .fail {
        background: rgba(210, 70, 70, 0.32);
      }
      .keys {
        color: #b9e5f1;
        font-family: ui-monospace, monospace;
      }
      .got {
        font-family: ui-monospace, monospace;
        white-space: nowrap;
      }
      .resumo {
        font-weight: 800;
        margin: 10px 0;
        font-size: 0.95rem;
      }
      .dica {
        color: #9aa79a;
        font-size: 0.8rem;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="voltar" href="../index.html" title="Voltar para a calculadora">← Calculadora</a>
      <h1>🤖 Robô do guia</h1>
      <select id="ex" title="Escolha um exemplo do guia"></select>
      <label>Velocidade (ms/tecla) <input id="vel" type="range" min="300" max="2500" value="1000" step="100" /></label>
      <button id="play" class="primary">▶ Tocar</button>
      <button id="playAll">▶▶ Tocar tudo</button>
      <button id="parar" disabled>⏹ Parar</button>
      <span id="tecla"></span>
      <span id="status"></span>
    </header>
    <div id="wrap">
      <div id="calcBox"><iframe id="calc" title="Calculadora" src="../index.html"></iframe></div>
      <div id="side">
        <div class="dica">
          O robô clica as teclas reais (destacadas) e compara o display com o guia. Cada linha:
          <span class="keys">teclas</span> → resultado obtido ✓/✗.
        </div>
        <div id="log"></div>
      </div>
    </div>

    <script type="module">
      import { traduzir } from "./keystrokes.js";
      import { conferir } from "./comparar.js";
      import { secao1 } from "./fixtures/secao-1.js";
      import { secao2Percentual, secao2Calendario } from "./fixtures/secao-2.js";
      import { secao3 } from "./fixtures/secao-3.js";
      import { secao4 } from "./fixtures/secao-4.js";
      import { secao5 } from "./fixtures/secao-5.js";
      import { secao6 } from "./fixtures/secao-6.js";
      import { erros } from "./fixtures/erros.js";
      import { solucoes } from "./fixtures/solucoes.js";
      import { programa } from "./fixtures/programa.js";
      import { secao7, apendiceA, apendiceB, apendiceC, apendiceF } from "./fixtures/extras.js";

      // Índice em inglês, seguindo o índice do User Guide (HP 12C Platinum):
      // Part I (Sections 1–7) · Part II (Sections 8–11) · Part III (Sections 12–16)
      // · Appendices A–E. (F: Battery/Service e G: regulatório não têm keystrokes
      // testáveis no guia.)
      const grupos = [
        ["Part I · Section 1: Getting Started", secao1],
        ["Part I · Section 2: Percentage Functions", secao2Percentual],
        ["Part I · Section 2: Calendar Functions", secao2Calendario],
        ["Part I · Section 3: Basic Financial Functions", secao3],
        ["Part I · Section 4: Additional Financial Functions", secao4],
        ["Part I · Section 5: Additional Operating Features", secao5],
        ["Part I · Section 6: Statistics Functions", secao6],
        ["Part I · Section 7: Mathematics Functions", secao7],
        ["Part II · Sections 8–11: Programming", programa],
        ["Part III · Sections 12–16: Solutions", solucoes],
        ["Appendix A: RPN and the Stack", apendiceA],
        ["Appendix B: Algebraic Mode (ALG)", apendiceB],
        ["Appendix C: More About IRR", apendiceC],
        ["Appendix D: Error Conditions", erros],
        ["Appendix F: Battery & Service — Self-Test", apendiceF],
      ];
      const exemplos = [];
      for (const [grupo, arr] of grupos) for (const ex of arr) exemplos.push({ ...ex, grupo });

      const elEx = document.getElementById("ex");
      exemplos.forEach((ex, i) => {
        const o = document.createElement("option");
        o.value = i;
        o.textContent = `${ex.grupo} · ${ex.nome}`;
        elEx.appendChild(o);
      });

      const frame = document.getElementById("calc");
      const log = document.getElementById("log");
      const statusEl = document.getElementById("status");
      const vel = document.getElementById("vel");
      const btnPlay = document.getElementById("play");
      const btnAll = document.getElementById("playAll");
      const btnStop = document.getElementById("parar");
      let parar = false;
      // Geração do run: cada "Tocar" invalida runs anteriores (um run suspenso num
      // sleep acorda, vê que não é mais o atual e morre — nunca dois robôs juntos).
      let runId = 0;

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      const doc = () => frame.contentDocument;
      const win = () => frame.contentWindow;
      const display = () => doc().querySelector("#display").textContent;
      const teclaEl = document.getElementById("tecla");

      async function resetCalc() {
        // Independência: limpa a Continuous Memory persistida (mesma origem) para
        // o iframe nascer no estado de fábrica (RPN, FIX 2, registradores zerados).
        try {
          localStorage.removeItem("br12c.continuousMemory");
        } catch (e) {
          /* indisponível: segue */
        }
        await new Promise((res) => {
          frame.onload = () => res();
          frame.src = "../index.html?t=" + Date.now();
        });
        for (let i = 0; i < 120; i += 1) {
          if (win().__BR12C_KEYS__ && doc().querySelector('#keyboard [data-action]')) break;
          await sleep(30);
        }
        // Realce forte da tecla pressionada, injetado dentro do iframe.
        try {
          const st = doc().createElement("style");
          st.textContent =
            "#keyboard [data-action].robo-press{outline:4px solid #f2c64d!important;outline-offset:1px;background:rgba(242,198,77,.30)!important;border-radius:8px;}";
          doc().head.appendChild(st);
        } catch (e) {
          /* ignora */
        }
      }

      async function pressActions(acoes, vivo) {
        const passo = Number(vel.value); // ms por tecla
        for (const acao of acoes) {
          if (!vivo()) return;
          // "hold-mode" é o botão Segurar (🔒), fora do #keyboard.
          const btn =
            acao === "hold-mode"
              ? doc().querySelector("#holdModeBtn")
              : doc().querySelector(`#keyboard [data-action="${acao}"]`);
          if (btn) {
            teclaEl.textContent = "⌨ " + (btn.getAttribute("aria-label") || acao);
            btn.classList.add("robo-press");
            await sleep(passo * 0.18);
            if (!vivo()) {
              btn.classList.remove("robo-press");
              return;
            }
            btn.dispatchEvent(new (win().MouseEvent)("click", { bubbles: true }));
            await sleep(passo * 0.62);
            btn.classList.remove("robo-press");
            await sleep(passo * 0.2);
          } else {
            await sleep(passo);
          }
        }
        teclaEl.textContent = "";
      }

      async function tocar(ex) {
        const meu = ++runId;
        const vivo = () => !parar && meu === runId;
        log.innerHTML = "";
        statusEl.textContent = "▶ tocando…";
        await resetCalc();
        if (!vivo()) return false;
        const KEYS = win().__BR12C_KEYS__;
        // Modo explícito SEMPRE (f RPN / f ALG) — nenhum teste herda o modo anterior.
        await pressActions(traduzir(["f", ex.modo === "alg" ? "ALG" : "RPN"], KEYS), vivo);
        let ok = 0;
        for (const linha of ex.linhas) {
          if (!vivo()) break;
          await pressActions(traduzir(linha.keys, KEYS), vivo);
          if (!vivo()) break;
          const r = conferir(display(), linha.display);
          if (r.ok) ok += 1;
          const div = document.createElement("div");
          div.className = "linha " + (r.ok ? "ok" : "fail");
          div.innerHTML =
            `<span class="keys">${linha.keys.join(" ")}</span>` +
            `<span class="got">${r.atual} ${r.ok ? "✓" : "✗ (esp. " + r.esperado + ")"}</span>`;
          log.appendChild(div);
          div.scrollIntoView({ block: "nearest" });
          await sleep(220);
        }
        if (!vivo()) {
          teclaEl.textContent = "";
          if (meu === runId) statusEl.textContent = "⏹ parado"; // órfão não mexe na UI
          return false;
        }
        const total = ex.linhas.length;
        const resumo = document.createElement("div");
        resumo.className = "resumo";
        resumo.textContent = `${ok}/${total} ${ok === total ? "✓ tudo certo" : "✗ com falhas"}`;
        log.appendChild(resumo);
        statusEl.textContent = `${ok}/${total}`;
        return ok === total;
      }

      function setBusy(b) {
        btnPlay.disabled = b;
        btnAll.disabled = b;
        elEx.disabled = b;
        btnStop.disabled = !b;
      }

      btnStop.onclick = () => {
        parar = true;
      };

      btnPlay.onclick = async () => {
        parar = false;
        setBusy(true);
        await tocar(exemplos[Number(elEx.value)]);
        setBusy(false);
      };
      btnAll.onclick = async () => {
        parar = false;
        setBusy(true);
        for (let i = 0; i < exemplos.length; i += 1) {
          if (parar) break;
          elEx.value = String(i);
          await tocar(exemplos[i]);
          if (parar) break;
          await sleep(700);
        }
        setBusy(false);
      };
    </script>
  </body>
</html>
