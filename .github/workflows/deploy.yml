name: Deploy to GitHub Pages

# ATIVO: a fonte do Pages é "GitHub Actions" (build_type=workflow). Este workflow
# publica o build minificado do Vite (local/dist) no Pages a cada push em main.
# Para reverter ao repositório cru: Settings -> Pages -> Source: Deploy from a branch
# (ou: gh api -X PUT repos/souonata/EngenhariaNata/pages -f build_type=legacy ...).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: local
        run: npm ci

      - name: Build de produção
        working-directory: local
        run: npm run build

      # O Vite só bundla scripts type="module". Os scripts clássicos abaixo ficam
      # com a referência relativa intacta no HTML, então precisam ser copiados com
      # o caminho preservado. (Se adicionar novo script clássico, inclua-o aqui.)
      - name: Copiar scripts clássicos não-bundlados
        run: |
          mkdir -p local/dist/assets/js/vendor
          cp assets/js/vendor/chart.umd.js local/dist/assets/js/vendor/
          cp fazenda/fazenda-database.js local/dist/fazenda/

      # hp12c é standalone (excluído do bundle): copiado como está.
      - name: Copiar app standalone hp12c
        run: cp -r hp12c local/dist/

      # Arquivos estáticos não referenciados por HTML (o Vite não os inclui).
      # Mantidos na raiz do repo para o serving cru; copiados para o artefato aqui.
      - name: Copiar estáticos de passagem
        run: |
          for f in robots.txt sitemap.xml favicon.svg .nojekyll googlee25d94076d09e414.html; do
            [ -e "$f" ] && cp "$f" local/dist/ || true
          done

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: local/dist

  deploy:
    name: Deploy ao GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
