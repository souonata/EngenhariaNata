<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Previsão 7 dias</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0b1220;
    --surface:#141c2e;
    --surface2:#1c2740;
    --border:#2a3550;
    --text:#e6edf6;
    --muted:#8b96b0;
    --temp:#ff8c42;
    --prob:#4aa8ff;
    --mm:#7ee3c1;
    --today:#3fb950;
    /* cores das linhas de grade (tema-aware) */
    --grid-min:rgba(255,255,255,.045);
    --grid-maj:rgba(255,255,255,.13);
    --grid-ref:rgba(255,255,255,.05);
    --grid-cross:rgba(255,255,255,.18);
    --rain:#8fe9cf;                /* hachura de chuva (tema-aware) */
  }

  /* ─── Tema claro ─── */
  html[data-theme="light"]{
    --bg:#e7edf5;
    --surface:#ffffff;
    --surface2:#eef3fa;
    --border:#ccd6e4;
    --text:#16202f;
    --muted:#5d6b82;
    --grid-min:rgba(0,0,0,.06);
    --grid-maj:rgba(0,0,0,.16);
    --grid-ref:rgba(0,0,0,.08);
    --grid-cross:rgba(0,0,0,.22);
    --rain:#2c8fb0;                /* tom de água, mais escuro p/ aparecer no claro */
  }
  html[data-theme="light"] body{ background:#e7edf5; }
  html[data-theme="light"] .app{ background:#ffffff; }
  html[data-theme="light"] .city-btn.active{
    background:linear-gradient(160deg,#dcefff,#eef3fa);
    box-shadow:0 0 0 1px rgba(74,168,255,.25), 0 4px 14px rgba(74,168,255,.18);
  }
  html[data-theme="light"] .home-button-fixed{
    background:linear-gradient(135deg,#e9f4ff,#d6e9fb);
    color:#1e6fa8;
  }

  /* linhas de grade do SVG (cor pelo tema) */
  .g-min{ stroke:var(--grid-min); }
  .g-maj{ stroke:var(--grid-maj); }
  .g-ref{ stroke:var(--grid-ref); }
  .g-cross{ stroke:var(--grid-cross); }
  .g-now{ stroke:var(--text); stroke-opacity:.6; }   /* hora atual realçada (hoje) */
  .rain-hatch{ stroke:var(--rain); }   /* cor da hachura de chuva pelo tema */

  /* ─── Barra superior: idioma + tema (oculta no topo ao abrir) ─── */
  .topbar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; gap:12px;
    padding:10px;
  }
  .lang-switch{
    display:flex; gap:3px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:999px; padding:3px;
  }
  .lang-btn{
    border:none; background:transparent; color:var(--muted);
    font-family:inherit; font-size:.72rem; font-weight:700; cursor:pointer;
    padding:5px 13px; border-radius:999px;
    transition:background .15s, color .15s;
  }
  .lang-btn.active{ background:var(--prob); color:#fff; }
  .theme-btn{
    border:1px solid var(--border); background:var(--surface2); color:var(--text);
    font-family:inherit; font-size:.72rem; font-weight:700; cursor:pointer;
    padding:6px 15px; border-radius:999px;
  }

  html{overscroll-behavior:none}
  body{
    background:radial-gradient(1200px 800px at 0% 0%,#172241 0%,var(--bg) 60%);
    background-attachment:fixed;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Primeira "tela" — mantém o gráfico ocupando o viewport; o rodapé do site e
     o botão home ficam abaixo e aparecem ao rolar. */
  .screen{ min-height:100dvh; display:flex; flex-direction:column; }

  /* Rodapé padrão do site (revelado ao rolar) */
  .site-footer{
    flex:0 0 auto; text-align:center;
    color:var(--muted); font-size:.72rem;
    padding:18px 14px 88px;   /* espaço extra embaixo para o botão home aparecer abaixo do rodapé */
  }
  .site-footer p{ margin:0; }
  .site-footer .footer-meta{ margin-top:6px; display:flex; justify-content:center; }
  .site-footer .footer-github-link{
    display:inline-flex; align-items:center; gap:5px;
    color:var(--muted); text-decoration:none; font-size:.68rem;
  }
  .site-footer .footer-github-link:hover{ color:var(--text); }
  .site-footer .footer-github-link svg{ width:13px; height:13px; fill:currentColor; }

  /* Botão home — só aparece (em degradê) ao rolar até perto do rodapé */
  .home-button-fixed{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#1d3759,#1c2740);
    border:1px solid var(--prob);
    box-shadow:0 8px 22px rgba(74,168,255,.28);
    color:var(--prob); text-decoration:none;
    opacity:0; pointer-events:none;
    transition:opacity .28s ease, transform .2s ease;
    z-index:60;
  }
  .home-button-fixed:hover{ transform:translateX(-50%) scale(1.08); }
  .home-button-fixed svg{ width:24px; height:24px; fill:currentColor; }

  /* ─── City buttons (header) ─── */
  .cities{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    padding:6px 6px;
    border-bottom:1px solid var(--border);
  }
  .city-btn{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:5px 3px 5px;
    display:flex;flex-direction:column;align-items:center;gap:1px;
    color:var(--text);
    font-family:inherit;
    cursor:pointer;
    transition:background .12s,border-color .12s,transform .08s;
    min-width:0;text-align:center;
    position:relative;                /* para posicionar a lixeira no canto */
    -webkit-tap-highlight-color:transparent;
  }
  /* Lixeira no canto superior direito do slot: limpa e abre a busca */
  .slot-clear{
    position:absolute; top:3px; right:4px;
    background:transparent; border:none; cursor:pointer;
    font-size:.68rem; line-height:1; padding:2px;
    color:var(--muted); opacity:.55;
    transition:opacity .12s;
  }
  .slot-clear:hover{ opacity:1; }

  /* Tooltip flutuante por hora (aparece ao tocar/clicar num número de temperatura) */
  #hourTip{
    position:fixed; z-index:200;
    background:var(--surface); border:1px solid var(--border); border-radius:11px;
    padding:9px 13px; font-size:.78rem; line-height:1.7;
    box-shadow:0 8px 28px rgba(0,0,0,.45);
    pointer-events:none; white-space:nowrap;
  }
  #hourTip b{ font-size:.85rem; display:block; margin-bottom:2px; color:var(--text); }
  #hourTip .tip-row{ display:flex; align-items:center; gap:5px; color:var(--muted); }
  .city-btn:hover{background:var(--surface)}
  .city-btn:active{transform:scale(.96)}
  .city-btn.active{
    background:linear-gradient(160deg,#1d3759,#1c2740);
    border-color:var(--prob);
    box-shadow:0 0 0 1px rgba(74,168,255,.25), 0 4px 14px rgba(74,168,255,.18);
  }
  .cb-row1{display:flex;align-items:center;gap:3px;line-height:1}
  .cb-name{
    font-size:.62rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;
  }
  .cb-emoji{font-size:.78rem;line-height:1}
  .cb-temp{
    font-size:1.15rem;font-weight:300;color:var(--temp);
    letter-spacing:-1px;line-height:1;margin-top:2px;
  }
  .cb-meta{
    font-size:.54rem;color:var(--muted);
    line-height:1.1;margin-top:1px;
    white-space:nowrap;
  }
  .city-btn.active .cb-meta{color:#b9c5dd}
  .city-btn.loading .cb-temp,.city-btn.loading .cb-meta{opacity:.4}

  /* ─── Column headers ─── */
  .col-head{
    flex:0 0 auto;
    display:grid;
    grid-template-columns: 60px 1fr;
    gap:6px;
    padding:5px 10px;
    font-size:.6rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .col-head .c-chart{display:flex;justify-content:space-between;align-items:center}
  .legend{display:flex;gap:8px;text-transform:none;letter-spacing:0;font-size:.6rem}
  .lg{display:flex;align-items:center;gap:3px}
  .lg .dot{width:6px;height:6px;border-radius:50%}
  .lg .bar{width:8px;height:5px;border-radius:1px}

  /* ─── Days table ─── */
  .days{
    flex:1 1 auto;
    min-height:0;
    display:flex;flex-direction:column;
  }
  .row{
    flex:1 1 0;
    display:grid;
    grid-template-columns: 60px 1fr;
    gap:6px;
    align-items:center;
    padding:4px 10px;
    border-bottom:1px solid var(--border);
    min-height:0;
  }
  .row:last-child{border-bottom:none}
  .row.today{background:linear-gradient(90deg,rgba(63,185,80,.08),transparent 60%)}

  .c-date{display:flex;flex-direction:column;line-height:1.1;min-width:0}
  .dow{font-size:.78rem;font-weight:700}
  .row.today .dow{color:#3fb950}
  .dnum{font-size:.62rem;color:var(--muted);margin-top:1px}
  .emo{font-size:.95rem;margin-top:1px}
  /* Aviso de chuva do dia (fechar janela / recolher roupa do varal) */
  .day-rain{font-size:.95rem;margin-top:2px;line-height:1;filter:drop-shadow(0 0 2px rgba(74,168,255,.5))}

  /* Chart cell */
  .c-chart{
    display:flex;flex-direction:column;
    height:100%;min-height:48px;gap:1px;min-width:0;
  }
  .wind-wrap{position:relative;flex:1 1 0;min-height:0;container-type:size}
  .spark-wrap{position:relative;flex:3 1 0;min-height:0;container-type:size}
  .spark{width:100%;height:100%;display:block}
  /* Rótulos de valor: SEM fundo/borda; legibilidade por sombra de texto. */
  .lbl{
    position:absolute;
    font-size:.62rem;font-weight:700;line-height:1;
    pointer-events:none;white-space:nowrap;
    text-shadow:0 0 3px var(--bg),0 0 3px var(--bg),0 0 2px var(--bg);
  }
  .lbl-max{ color:#ff7a5c; }
  .lbl-min{ color:#7cc4ff; }
  .lbl-set{
    position:absolute; right:3px; transform:translateY(-50%);
    font-size:.6rem; font-weight:700; line-height:1;
    color:#9fe6b5; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 2px var(--bg),0 0 2px var(--bg);
  }

  /* Rótulos de grau (faixa livre à direita do gráfico), na cor da temperatura */
  .deg{
    position:absolute; right:2px; transform:translateY(-50%);
    font-size:.46rem; font-weight:700; line-height:1; white-space:nowrap;
    pointer-events:none;
    text-shadow:0 0 2px var(--bg), 0 0 2px var(--bg);
  }
  .deg-set{ font-size:.54rem; }

  /* Rótulo do pico de vento (sem fundo) */
  .lbl-wind{
    position:absolute;
    font-size:.5rem; font-weight:700; line-height:1; white-space:nowrap;
    color:#9aa7d6; pointer-events:none;
    text-shadow:0 0 3px var(--bg),0 0 3px var(--bg),0 0 2px var(--bg);
  }
  /* Hora discreta do cruzamento (puxada por um traço) */
  .ev-hr{
    position:absolute; transform:translate(-50%,-50%);
    font-size:.5rem; font-weight:700; line-height:1; white-space:nowrap;
    color:var(--muted); pointer-events:none;
    text-shadow:0 0 2px var(--bg),0 0 2px var(--bg);
  }
  /* Bolinha por hora na curva (cor do gradiente da temperatura daquela hora) */
  .h-dot{
    position:absolute; transform:translate(-50%,-50%);
    width:5px; height:5px; border-radius:50%;
    pointer-events:none; box-shadow:0 0 0 1px var(--bg);
  }
  /* Ícones de série (🌡️ no início da linha de temperatura, 💨 na faixa do vento),
     no slot reservado à esquerda do gráfico; tamanho em cqw como as bolas. */
  .ser-ico{
    position:absolute; transform:translate(-50%,-50%);
    line-height:1; pointer-events:auto;
  }
  /* Bola por hora: temperatura dentro, cor do gradiente; diâmetro em cqw (% da
     largura do gráfico) para ficarem tangentes e escalarem com a tela. */
  .t-ball{
    position:absolute; transform:translate(-50%,-50%);
    aspect-ratio:1; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; line-height:1; letter-spacing:-.02em;
    box-shadow:0 0 0 .5px var(--bg);
  }
  /* Número por hora (não-extremos): só texto na cor do gradiente, com halo da
     cor do fundo para "interromper" a linha atrás e manter a leitura fácil. */
  .t-num{
    position:absolute; transform:translate(-50%,-50%);
    font-weight:800; line-height:1; white-space:nowrap; pointer-events:auto;
    text-shadow:
      0 0 2px var(--bg), 0 0 2px var(--bg), 0 0 2px var(--bg),
      0 0 3px var(--bg), 1px 1px 1px var(--bg), -1px -1px 1px var(--bg);
  }
  /* Bolota que une ponto + valor (número em grafite dentro, sem unidade) */
  .val-dot{
    position:absolute; transform:translate(-50%,-50%);
    min-width:15px; height:15px; padding:0 2px; box-sizing:border-box;
    border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:.46rem; font-weight:800; line-height:1;
    pointer-events:none;
    box-shadow:0 0 0 1.5px var(--bg);
  }

  /* Marcadores na posição da hora: cruzamento do alvo (▲/▼) e chuva (💧) */
  .cross-mark{
    position:absolute; transform:translate(-50%,-50%);
    font-size:.62rem; font-weight:700; line-height:1; pointer-events:none;
    text-shadow:0 0 2px var(--bg), 0 0 2px var(--bg);
  }
  .rain-mark{
    position:absolute; top:1px; transform:translateX(-50%);
    font-size:.6rem; line-height:1; pointer-events:none;
  }

  /* Trigger strip */
  .triggers{
    flex:0 0 auto;
    display:flex;gap:7px;
    font-size:.56rem;line-height:1;
    white-space:nowrap;overflow:hidden;
    padding:1px 0 0;font-weight:700;
    min-height:9px;
  }
  .trig-up   { color:#ff6b4a; }
  .trig-dn   { color:#5edaff; }
  .trig-rain { color:var(--mm); }

  /* Eixo de horas (só sob o dia de hoje) */
  .hour-axis{
    position:relative;
    flex:0 0 auto;
    height:10px;
    margin-top:1px;
    container-type:size;            /* fonte das horas em cqw; relógio capado pela altura (cqh) */
  }
  .hour-axis span{
    position:absolute;
    top:0;
    font-size:.5rem;
    line-height:1;
    color:var(--muted);
    white-space:nowrap;
  }
  /* Eixo denso (Hoje, todas as horas) — fonte menor p/ caber 0–24 */
  .hour-axis.dense span{ font-size:.4rem; }
  /* Relógio identificando a série das horas (à esquerda da legenda) */
  .hour-axis .axis-ico{
    left:0; top:50%; transform:translateY(-50%);
    color:var(--muted); pointer-events:none;
  }

  /* Stats cell */
  .c-stats{
    display:flex;flex-direction:column;align-items:flex-end;
    line-height:1.15;font-size:.66rem;
  }
  .stat-pop{color:var(--prob)}
  .stat-pop.dry{color:var(--muted)}
  .stat-mm{color:var(--mm);margin-top:1px}
  .stat-mm.zero{color:var(--muted)}

  /* ─── Footer ─── */
  .footer{
    flex:0 0 auto;
    padding:4px 10px;
    font-size:.58rem;color:var(--muted);
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--border);
  }
  .footer a{color:var(--muted)}

  /* ─── Loading / Error ─── */
  .overlay{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;z-index:50;padding:24px;text-align:center;
  }
  .spinner{
    width:34px;height:34px;border:3px solid var(--border);
    border-top-color:var(--prob);border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-ico{font-size:2.4rem}
  .err-msg{color:var(--muted);font-size:.85rem;max-width:300px}
  .btn{background:var(--prob);color:#fff;border:none;border-radius:8px;
       padding:9px 18px;font-size:.85rem;cursor:pointer;font-family:inherit}

  /* ─── Busca de cidade (lupa) ─── */
  .search-btn{ align-items:center; justify-content:center; }
  .search-btn .lupa{ font-size:1.7rem; line-height:1; }
  .search-overlay{
    background:rgba(7,11,20,.78);
    align-items:flex-start; justify-content:center;
    padding:14vh 16px 16px;
  }
  html[data-theme="light"] .search-overlay{ background:rgba(20,30,45,.4); }
  .search-box{
    width:min(94%,420px);
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:10px; box-shadow:0 24px 60px rgba(0,0,0,.5); text-align:left;
  }
  .search-row{ display:flex; align-items:center; gap:8px; }
  .search-ico{ font-size:1rem; flex:0 0 auto; }
  #searchInput{
    flex:1; min-width:0;
    background:var(--surface2); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; color:var(--text); font-family:inherit; font-size:.95rem;
  }
  #searchInput:focus{ outline:none; border-color:var(--prob); }
  .search-x{ background:transparent; border:none; color:var(--muted); font-size:1rem; cursor:pointer; padding:4px 6px; }
  .search-results{ margin-top:8px; display:flex; flex-direction:column; gap:2px; max-height:46vh; overflow:auto; }
  .search-item{
    display:flex; flex-direction:column; align-items:flex-start; gap:1px;
    text-align:left; background:transparent; border:none; border-radius:8px;
    padding:8px 10px; cursor:pointer; color:var(--text); font-family:inherit;
  }
  .search-item:hover{ background:var(--surface2); }
  .si-name{ font-size:.9rem; font-weight:700; }
  .si-sub{ font-size:.72rem; color:var(--muted); }
  .search-empty{ padding:10px; color:var(--muted); font-size:.85rem; text-align:center; }

  /* ─── Desktop ─── */
  @media (min-width:768px){
    body{background:#070b14}
    .screen{align-items:center;justify-content:center}
    .app{
      width:min(100%,860px);
      height:min(100dvh,740px);
      border:1px solid var(--border);border-radius:18px;
      overflow:hidden;display:flex;flex-direction:column;
      background:radial-gradient(900px 600px at 0% 0%,#172241 0%,var(--bg) 60%);
      box-shadow:0 24px 60px rgba(0,0,0,.5);
    }
    .cities{padding:10px 14px;gap:10px}
    .city-btn{padding:9px 6px;border-radius:12px}
    .cb-name{font-size:.78rem;max-width:none}
    .cb-emoji{font-size:1rem}
    .cb-temp{font-size:1.6rem;margin-top:4px}
    .cb-meta{font-size:.7rem;margin-top:3px}
    .col-head, .row{grid-template-columns: 80px 1fr;padding-left:18px;padding-right:18px}
    .dow{font-size:.95rem}.dnum{font-size:.72rem}.emo{font-size:1.15rem}.day-rain{font-size:1.15rem}
    .lbl{font-size:.72rem}
    .lbl-set{font-size:.72rem}
    .deg{font-size:.58rem}
    .deg-set{font-size:.66rem}
    .lbl-wind{font-size:.62rem}
    .ev-hr{font-size:.58rem}
    .cross-mark{font-size:.74rem}
    .rain-mark{font-size:.72rem}
    .c-stats{font-size:.78rem}
    .triggers{font-size:.68rem;min-height:11px;gap:10px}
    .hour-axis{height:12px}
    .hour-axis span{font-size:.62rem}
    .hour-axis.dense span{font-size:.5rem}
    .val-dot{min-width:18px;height:18px;font-size:.56rem}
    .h-dot{width:6px;height:6px}
    .footer{padding:8px 18px;font-size:.7rem}
  }
  @media (max-width:767px){.app{flex:1;display:flex;flex-direction:column;min-height:0}}
  @media (max-height:480px){
    .cities{padding:3px 4px;gap:3px}
    .city-btn{padding:3px 2px}
    .cb-temp{font-size:.95rem}
    .cb-meta{display:none}
    .triggers{display:none}
    .hour-axis{display:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="lang-switch">
    <button type="button" class="lang-btn" data-lang="pt-BR">PT</button>
    <button type="button" class="lang-btn" data-lang="it-IT">IT</button>
  </div>
  <button type="button" class="theme-btn" id="themeBtn">Light</button>
</div>

<div class="screen">
  <div class="app" id="app" style="display:none;flex:1;flex-direction:column;min-height:0">

    <nav class="cities" id="cityBtns"></nav>

    <main class="days" id="days"></main>

    <footer class="footer">
      <span id="footLoc">📍 —</span>
      <span><span id="sourceLbl">Fonte: </span><a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></span>
    </footer>
  </div>
</div>

<footer class="site-footer">
  <p id="footerBrand">💻 Portfólio Engenharia NATA @ 2026</p>
  <div class="footer-meta">

<div id="hourTip" style="display:none" aria-live="polite"></div>

<script>
/* ============================================================
   Open-Meteo — API meteorológica europeia, gratuita, sem chave
   Múltiplas coordenadas em uma única requisição.
   ============================================================ */

// 4 slots persistentes no localStorage. Os dois primeiros têm defaults (Milano e
// Curitiba) que são gravados no boot se o slot ainda não foi definido pelo usuário.
// Qualquer slot pode ser apagado com a lixeira e substituído por uma busca.
const N_SLOTS = 4;
const LS_SLOT    = i => `previsao_slot_${i}_v2`;   // v2: all-4-slots layout
const LS_CITY    = 'previsao_city_v1';
const LS_HISTMAX = 'previsao_histmax_v1';
const HISTMAX_TTL_DAYS = 7;

const SLOT_DEFAULTS = [
  { id:'milao',    name:'Milão',    nameIt:'Milano', lat: 45.4642, lon:  9.1900 },
  { id:'curitiba', name:'Curitiba', lat:-25.4284,    lon:-49.2733 },
  null, null
];

function loadSlotCity(i){
  try { const r=JSON.parse(localStorage.getItem(LS_SLOT(i))); return (r&&r.id&&r.lat)?r:null; }
  catch(e){ return null; }
}
function saveSlotCity(i,city){ try{ localStorage.setItem(LS_SLOT(i),JSON.stringify({id:city.id,name:city.name,nameIt:city.nameIt||undefined,lat:city.lat,lon:city.lon})); }catch(e){} }
function clearSlotCity(i){ try{ localStorage.removeItem(LS_SLOT(i)); }catch(e){} }

// Na primeira visita, grava os defaults nos slots que ainda não têm nada salvo.
(function seedDefaults(){
  for(let i=0;i<N_SLOTS;i++){
    if(!localStorage.getItem(LS_SLOT(i)) && SLOT_DEFAULTS[i]) saveSlotCity(i, SLOT_DEFAULTS[i]);
  }
})();

// slotCities[0..3] = city object ou null
let slotCities = Array.from({length:N_SLOTS}, (_,i) => loadSlotCity(i));

// CITIES = slots não-nulos em ordem (sem nulls)
function buildCities(){ return slotCities.filter(Boolean); }
let CITIES = buildCities();

// índice em CITIES para o slot si
function cityIdxForSlot(si){
  let n=0; for(let i=0;i<si;i++) if(slotCities[i]) n++; return n;
}
/* i18n mínimo (PT/IT) — usa a mesma chave de idioma do site (engnata_idioma). */
const I18N = {
  'pt-BR': {
    loading:'Carregando previsão…', error:'Erro ao carregar dados.', retry:'Tentar novamente',
    today:'Hoje', dow:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
    source:'Fonte', footer:'💻 Portfólio Engenharia NATA @ 2026',
    home:'Voltar para a tela inicial', targetTitle:'Temperatura-alvo de interior',
    upTitle:'Temperatura sobe acima do alvo', dnTitle:'Temperatura cai abaixo do alvo',
    rainTitle:'Chuva: prob >30% e >0,5mm',
    rainAction:'Vai chover — feche a janela e recolha a roupa do varal',
    search:'Buscar', searchPh:'Digite uma cidade…', searching:'Buscando…', noResults:'Nenhuma cidade encontrada',
    tempLabel:'Temperatura', windLabel:'Vento', rainLabel:'Chuva', windPeak:'Vento máx.',
    feelsLabel:'Sensação térmica', probLabel:'prob.'
  },
  'it-IT': {
    loading:'Caricamento previsioni…', error:'Errore nel caricamento dei dati.', retry:'Riprova',
    today:'Oggi', dow:['Dom','Lun','Mar','Mer','Gio','Ven','Sab'],
    source:'Fonte', footer:'💻 Portafoglio Ingegneria NATA @ 2026',
    home:'Torna alla schermata iniziale', targetTitle:'Temperatura interna obiettivo',
    upTitle:'La temperatura sale sopra l\'obiettivo', dnTitle:'La temperatura scende sotto l\'obiettivo',
    rainTitle:'Pioggia: prob >30% e >0,5mm',
    rainAction:'Pioggia in arrivo — chiudi la finestra e ritira il bucato',
    search:'Cerca', searchPh:'Scrivi una città…', searching:'Ricerca…', noResults:'Nessuna città trovata',
    tempLabel:'Temperatura', windLabel:'Vento', rainLabel:'Pioggia', windPeak:'Vento max',
    feelsLabel:'Temperatura percepita', probLabel:'prob.'
  }
};
let LANG = (() => { try { const s = sessionStorage.getItem('engnata_idioma'); return (s === 'it-IT' || s === 'pt-BR') ? s : 'pt-BR'; } catch (e) { return 'pt-BR'; } })();
const T = () => I18N[LANG];
const cityName = c => (LANG.startsWith('it') && c.nameIt) ? c.nameIt : c.name;

/* Tema: usa a mesma chave do site (engnata_theme_mode, em JSON). O previsao é
   dark por padrão; só vira light com data-theme="light". */
let THEME = (() => { try { return JSON.parse(localStorage.getItem('engnata_theme_mode')) || 'dark'; } catch (e) { return 'dark'; } })();

let cityData = [];              // dados de cada cidade (índices alinhados com CITIES)
let currentIdx = (() => { const i=CITIES.findIndex(c=>c.id===localStorage.getItem(LS_CITY)); return Math.max(0,i); })();

// Máx. horário de chuva (mm) dos últimos 365 dias, por cidade — usado como teto
// FIXO da escala das barras. Carrega do cache (mesmo se vencido) para uso imediato.
let histMaxByCity = (() => {
  try { const raw = JSON.parse(localStorage.getItem(LS_HISTMAX) || 'null'); return (raw && raw.values) || {}; }
  catch (e) { return {}; }
})();

/* ──── Boot ──── */
applyTheme(false);   // aplica o tema antes de tudo (inclui a tela de carregamento)
applyLangStatic();   // textos fixos (loading/erro/rodapé/home) no idioma atual
wireControls();      // botões de idioma e tema
wireSearch();        // campo de busca de cidade (lupa)
wireTip();           // tooltip por hora (temperatura, vento, chuva)

(async function init(){
  buildCityButtonShells();
  try {
    await loadAll();
    ensureHistMax();      // em background: atualiza o teto da escala e re-renderiza
    setupHomeFade();      // botão home aparece em degradê só ao rolar até o rodapé
    scrollPastTopbar();   // abre já rolado abaixo da barra de idioma/tema (gráfico no topo)
  }
  catch (err) { showError(err.message); }
})();

/* ──── Idioma e tema ──── */
function applyTheme(persist){
  const html = document.documentElement;
  if (THEME === 'light') html.setAttribute('data-theme', 'light');
  else html.removeAttribute('data-theme');         // dark = base do app
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = THEME === 'light' ? 'Dark' : 'Light';
  if (persist) { try { localStorage.setItem('engnata_theme_mode', JSON.stringify(THEME)); } catch (e) {} }
}

function applyLangStatic(){
  const t = T();
  document.documentElement.lang = LANG;
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('loadingMsg', t.loading);
  set('errMsg', t.error);
  set('retryBtn', t.retry);
  set('footerBrand', t.footer);
  set('sourceLbl', t.source + ': ');
  const home = document.querySelector('.home-button-fixed');
  if (home) { home.title = t.home; home.setAttribute('aria-label', t.home); }
  const si = document.getElementById('searchInput'); if (si) si.placeholder = t.searchPh;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === LANG));
}

function wireControls(){
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.lang === LANG) return;
      LANG = b.dataset.lang;
      try { sessionStorage.setItem('engnata_idioma', LANG); } catch (e) {}
      applyLangStatic();
      if (cityData.length) { renderCityButtons(); renderDays(); }
    });
  });
  const tbtn = document.getElementById('themeBtn');
  if (tbtn) tbtn.addEventListener('click', () => {
    THEME = THEME === 'light' ? 'dark' : 'light';
    applyTheme(true);
  });
}

function scrollPastTopbar(){
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  requestAnimationFrame(() => {
    const screen = document.querySelector('.screen');
    if (screen) screen.scrollIntoView({ block: 'start' });  // alinha o gráfico ao topo, escondendo a barra
  });
}

/* ──── Botão home: aparece em degradê de transparência conforme a página rola
   até perto do rodapé (abaixo do gráfico), deixando a tela limpa no topo. ──── */
function setupHomeFade(){
  const btn = document.querySelector('.home-button-fixed');
  if (!btn) return;
  const FAIXA = 100;   // px de transição da aparição perto do fundo
  const atualizar = () => {
    const doc = document.documentElement;
    const rolavel = doc.scrollHeight - window.innerHeight;
    let op;
    if (rolavel <= 4) {
      op = 1;                                   // não rola → sempre visível (fail-safe)
    } else {
      const distFundo = rolavel - window.scrollY;
      op = Math.min(1, Math.max(0, 1 - distFundo / FAIXA));
    }
    btn.style.opacity = op.toFixed(3);
    btn.style.pointerEvents = op > 0.05 ? 'auto' : 'none';
  };
  atualizar();
  window.addEventListener('scroll', atualizar, { passive: true });
  window.addEventListener('resize', atualizar);
}

/* ──── Constrói botões vazios (antes dos dados chegarem) ──── */
function buildCityButtonShells(){
  const wrap = document.getElementById('cityBtns');
  wrap.innerHTML = '';
  for(let si=0; si<N_SLOTS; si++) wrap.appendChild(makeSlotBtn(si, false));
}

/* Cria o botão de um slot — vazio (lupa) ou com cidade (dados + lixeira). */
function makeSlotBtn(si, withData){
  const city = slotCities[si];
  const btn  = document.createElement('button');
  btn.type   = 'button';
  btn.dataset.slot = si;
  if(!city){
    btn.className = 'city-btn search-btn';
    btn.title = T().search;
    btn.innerHTML = '<span class="lupa">🔍</span>';
    btn.addEventListener('click', () => openSearch(si));
    return btn;
  }
  const ci = cityIdxForSlot(si);
  btn.className = 'city-btn' + (!withData ? ' loading' : '') + (ci === currentIdx ? ' active' : '');
  if(withData && cityData[ci]){
    const cur = cityData[ci].current, [emo,desc] = wmo(cur.weather_code);
    btn.innerHTML = `<span class="cb-row1"><span class="cb-name">${cityName(city)}</span><span class="cb-emoji" title="${desc}">${emo}</span></span><span class="cb-temp" title="${T().tempLabel}">${Math.round(cur.temperature_2m)}°</span><span class="cb-meta" title="🌡 ${T().feelsLabel} · 💨 ${T().windLabel} (km/h)">🌡${Math.round(cur.apparent_temperature)}° · 💨${Math.round(cur.wind_speed_10m)} km/h</span><button type="button" class="slot-clear" title="${T().search}">🗑️</button>`;
  } else {
    btn.innerHTML = `<span class="cb-row1"><span class="cb-name">${cityName(city)}</span><span class="cb-emoji">—</span></span><span class="cb-temp">—°</span><span class="cb-meta">— · —</span><button type="button" class="slot-clear" title="${T().search}">🗑️</button>`;
  }
  btn.addEventListener('click', (e) => { if(!e.target.closest('.slot-clear')) selectCity(ci); });
  btn.querySelector('.slot-clear').addEventListener('click', (e) => { e.stopPropagation(); clearSlot(si); });
  return btn;
}

/* ──── Fetch (todas as cidades em uma requisição) ──── */
async function loadAll(){
  const url = new URL('https://api.open-meteo.com/v1/forecast');
  url.search = new URLSearchParams({
    latitude:  CITIES.map(c => c.lat).join(','),
    longitude: CITIES.map(c => c.lon).join(','),
    hourly:    'temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_direction_10m',
    current:   'temperature_2m,apparent_temperature,weather_code,wind_speed_10m',
    daily:     'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max',
    timezone:  'auto',
    forecast_days: 7
  });

  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const arr = await res.json();
  // Sempre array com múltiplas coords
  const list = Array.isArray(arr) ? arr : [arr];

  cityData = CITIES.map((c, i) => {
    const d = list[i];
    const hourlyByDay = {};
    d.hourly.time.forEach((iso, k) => {
      const day = iso.slice(0,10);
      (hourlyByDay[day] = hourlyByDay[day] || []).push({
        hour: +iso.slice(11,13),
        temp: d.hourly.temperature_2m[k],
        pop:  d.hourly.precipitation_probability[k] ?? 0,
        mm:   d.hourly.precipitation[k] ?? 0,
        code: d.hourly.weather_code[k],
        wind:    d.hourly.wind_speed_10m    ? (d.hourly.wind_speed_10m[k]    ?? 0) : 0,
        windDir: d.hourly.wind_direction_10m ? (d.hourly.wind_direction_10m[k] ?? 0) : 0
      });
    });
    const daily = d.daily.time.map((iso, k) => ({
      date: iso,
      tMax: d.daily.temperature_2m_max[k],
      tMin: d.daily.temperature_2m_min[k],
      mmSum: d.daily.precipitation_sum[k],
      popMax: d.daily.precipitation_probability_max[k] ?? 0,
      code: d.daily.weather_code[k]
    }));
    return { city:c, current:d.current, hourlyByDay, daily };
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderCityButtons();
  renderDays();
}

/* ──── Botões (já com dados) ──── */
function renderCityButtons(){
  const wrap = document.getElementById('cityBtns');
  wrap.innerHTML = '';
  for(let si=0; si<N_SLOTS; si++) wrap.appendChild(makeSlotBtn(si, true));
}

/* ──── Busca de cidade (geocoding Open-Meteo) — salva no slot no localStorage ──── */
let searchTimer = null;
let currentSearchSlot = 0;
function openSearch(si){
  currentSearchSlot = si;
  const inp = document.getElementById('searchInput');
  document.getElementById('searchResults').innerHTML = '';
  inp.value = '';
  document.getElementById('search').style.display = 'flex';
  setTimeout(() => inp.focus(), 30);
}
function closeSearch(){ document.getElementById('search').style.display = 'none'; }

async function geocode(name){
  const url = new URL('https://geocoding-api.open-meteo.com/v1/search');
  url.search = new URLSearchParams({ name, count: '6', language: LANG.startsWith('it') ? 'it' : 'pt', format: 'json' });
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return (await res.json()).results || [];
}
function renderSearchResults(results){
  const box = document.getElementById('searchResults');
  if (!results.length) { box.innerHTML = `<div class="search-empty">${T().noResults}</div>`; return; }
  box.innerHTML = results.map((r, i) => {
    const sub = [r.admin1, r.country].filter(Boolean).join(' · ');
    return `<button type="button" class="search-item" data-i="${i}"><span class="si-name">${r.name}</span><span class="si-sub">${sub}</span></button>`;
  }).join('');
  box.querySelectorAll('.search-item').forEach(el =>
    el.addEventListener('click', () => addCityFromResult(results[+el.dataset.i])));
}
async function addCityFromResult(r){
  const id   = 'q_' + r.latitude.toFixed(3) + '_' + r.longitude.toFixed(3);
  const city = { id, name: r.name, lat: r.latitude, lon: r.longitude };
  slotCities[currentSearchSlot] = city;
  saveSlotCity(currentSearchSlot, city);
  CITIES     = buildCities();
  currentIdx = cityIdxForSlot(currentSearchSlot);
  try { localStorage.setItem(LS_CITY, id); } catch(e){}
  closeSearch();
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('app').style.display    = 'none';
  try { await loadAll(); ensureHistMax(); }
  catch(e){ showError(e.message); }
}

/* Limpa o slot, remove do localStorage. Se estava activo ou se não há mais
   cidades, volta para o primeiro slot preenchido (ou mostra só lupas). */
async function clearSlot(si){
  const wasActive = slotCities[si] && currentIdx === cityIdxForSlot(si);
  slotCities[si] = null;
  clearSlotCity(si);
  CITIES = buildCities();
  if(CITIES.length === 0){
    // Todos os slots vazios — só mostra as lupas, sem fetch
    cityData = [];
    currentIdx = 0;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display     = 'flex';
    renderCityButtons();
    document.getElementById('days').innerHTML = '';
    return;
  }
  if(wasActive || currentIdx >= CITIES.length){
    currentIdx = 0;
    try{ localStorage.setItem(LS_CITY, CITIES[0].id); }catch(e){}
  }
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('app').style.display    = 'none';
  try { await loadAll(); ensureHistMax(); }
  catch(e){ showError(e.message); }
}
function wireSearch(){
  const inp = document.getElementById('searchInput');
  const box = document.getElementById('searchResults');
  const run = async () => {
    const q = inp.value.trim();
    if (q.length < 2) { box.innerHTML = ''; return; }
    box.innerHTML = `<div class="search-empty">${T().searching}</div>`;
    try { renderSearchResults(await geocode(q)); }
    catch (e) { box.innerHTML = `<div class="search-empty">${T().noResults}</div>`; }
  };
  inp.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(run, 350); });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { clearTimeout(searchTimer); run(); }
    if (e.key === 'Escape') closeSearch();
  });
  document.getElementById('searchClose').addEventListener('click', closeSearch);
  document.getElementById('search').addEventListener('click', (e) => { if (e.target.id === 'search') closeSearch(); });
}

/* ──── Tooltip por hora ──── */
function windDirLabel(deg){
  const d = Math.round(+deg/45)%8;
  const ptDirs = ['N','NE','L','SE','S','SO','O','NO'];
  const itDirs = ['N','NE','E','SE','S','SO','O','NO'];
  return (LANG.startsWith('it') ? itDirs : ptDirs)[d];
}
function showTip(cx, cy, el){
  const hr  = el.dataset.h;
  const t   = el.dataset.t;
  const w   = el.dataset.w;
  const wd  = el.dataset.wd;
  const pop = el.dataset.pop;
  const mm  = el.dataset.mm;
  const tt  = T();
  const dir = windDirLabel(wd);
  const tip = document.getElementById('hourTip');
  tip.innerHTML =
    `<b>${String(hr).padStart(2,'0')}h</b>` +
    `<div class="tip-row">🌡️ <span>${t}°C</span></div>` +
    `<div class="tip-row">💨 <span>${w} km/h ${dir}</span></div>` +
    `<div class="tip-row">🌧️ <span>${pop}% · ${mm} mm</span></div>`;
  tip.style.display = 'block';
  const vw = window.innerWidth, vh = window.innerHeight;
  const tw = tip.offsetWidth  || 160;
  const th = tip.offsetHeight || 90;
  let lx = cx + 14, ly = cy - th / 2;
  if (lx + tw > vw - 4) lx = cx - tw - 14;
  if (ly < 4) ly = 4;
  if (ly + th > vh - 4) ly = vh - th - 4;
  tip.style.left = lx + 'px';
  tip.style.top  = ly + 'px';
}
function closeTip(){ document.getElementById('hourTip').style.display = 'none'; }
function wireTip(){
  document.getElementById('days').addEventListener('click', e => {
    // Clique direto num valor: usa os dados do próprio elemento.
    const el = e.target.closest('.t-num,.t-ball');
    if (el) { showTip(e.clientX, e.clientY, el); e.stopPropagation(); return; }

    // Clique em qualquer área do gráfico: encontra a hora mais próxima pelo x%.
    const chartArea = e.target.closest('.c-chart');
    if (!chartArea) { closeTip(); return; }
    const row = chartArea.closest('.row');
    const refEl = chartArea.querySelector('.wind-wrap') || chartArea.querySelector('.spark-wrap');
    if (!refEl) { closeTip(); return; }
    const rect = refEl.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width * 100;
    const axisSpans = [...(chartArea.querySelector('.hour-axis') || document.createElement('div'))
      .querySelectorAll('span:not(.axis-ico)')];
    let best = null, bd = Infinity;
    axisSpans.forEach(s => {
      const d = Math.abs(parseFloat(s.style.left) - xPct);
      if (d < bd) { bd = d; best = s; }
    });
    if (!best) { closeTip(); return; }
    const h = parseInt(best.textContent, 10);
    const dataEl = row.querySelector(`.t-ball[data-h="${h}"],.t-num[data-h="${h}"]`);
    if (dataEl) { showTip(e.clientX, e.clientY, dataEl); e.stopPropagation(); }
    else closeTip();
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#hourTip,.c-chart')) closeTip();
  });
}

function selectCity(i){
  if (i === currentIdx) return;
  currentIdx = i;
  try{ localStorage.setItem(LS_CITY, CITIES[i].id); }catch(e){}
  renderCityButtons();
  renderDays();
}

/* ──── Histórico: maior chuva horária (mm) dos últimos 365 dias por cidade ──── */
function histCacheFresh(){
  try {
    const raw = JSON.parse(localStorage.getItem(LS_HISTMAX) || 'null');
    if (!raw || !raw.date || !raw.values) return false;
    if (!CITIES.every(c => typeof raw.values[c.id] === 'number')) return false;
    const ageDays = (Date.now() - new Date(raw.date + 'T00:00:00').getTime()) / 86400000;
    return ageDays >= 0 && ageDays < HISTMAX_TTL_DAYS;
  } catch (e) { return false; }
}

async function fetchHistMax(){
  // API de arquivo histórico do Open-Meteo (latência de alguns dias → end = hoje-5).
  const end = new Date();   end.setDate(end.getDate() - 5);
  const start = new Date(end); start.setDate(start.getDate() - 364);
  const fmt = d => d.toISOString().slice(0, 10);

  const url = new URL('https://archive-api.open-meteo.com/v1/archive');
  url.search = new URLSearchParams({
    latitude:  CITIES.map(c => c.lat).join(','),
    longitude: CITIES.map(c => c.lon).join(','),
    start_date: fmt(start),
    end_date:   fmt(end),
    hourly:    'precipitation',
    timezone:  'auto'
  });

  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const arr = await res.json();
  const list = Array.isArray(arr) ? arr : [arr];

  const out = {};
  CITIES.forEach((c, i) => {
    const p = (list[i] && list[i].hourly && list[i].hourly.precipitation) || [];
    let m = 0;
    for (const v of p) { if (v != null && v > m) m = v; }
    out[c.id] = m;
  });
  return out;
}

async function ensureHistMax(){
  if (histCacheFresh()) return;            // cache ainda válido → não refaz a requisição pesada
  try {
    const vals = await fetchHistMax();
    histMaxByCity = vals;
    localStorage.setItem(LS_HISTMAX, JSON.stringify({ date: new Date().toISOString().slice(0,10), values: vals }));
    if (cityData.length) renderDays();      // re-renderiza com o teto histórico
  } catch (e) { /* mantém o fallback (semana) */ }
}

/* ──── WMO codes ──── */
function wmo(code){
  // Seletor de variação ️ (U+FE0F) força a apresentação COLORIDA do emoji; sem
  // ele, vários destes glifos viram texto monocromático (preto no tema claro).
  if (code === 0)              return ['☀️','Céu limpo'];
  if (code === 1)              return ['🌤️','Quase limpo'];
  if (code === 2)              return ['⛅','Parc. nublado'];
  if (code === 3)              return ['☁️','Nublado'];
  if (code === 45 || code===48)return ['🌫️','Nevoeiro'];
  if (code >= 51 && code <= 57)return ['🌦️','Chuvisco'];
  if (code === 61)             return ['🌧️','Chuva fraca'];
  if (code === 63)             return ['🌧️','Chuva'];
  if (code === 65)             return ['🌧️','Chuva forte'];
  if (code >= 66 && code <= 67)return ['🌧️','Chuva congel.'];
  if (code >= 71 && code <= 77)return ['❄️','Neve'];
  if (code >= 80 && code <= 82)return ['🌦️','Aguaceiros'];
  if (code === 85 || code===86)return ['🌨️','Aguac. neve'];
  if (code === 95)             return ['⛈️','Trovoada'];
  if (code >= 96 && code <= 99)return ['⛈️','Trov./granizo'];
  return ['🌡️','—'];
}

/* ──── Render days table ──── */
function renderDays(){
  const wrap = document.getElementById('days');
  const cd = cityData[currentIdx];
  wrap.innerHTML = '';
  const todayISO = cd.daily[0] ? cd.daily[0].date : new Date().toISOString().slice(0,10);

  // Teto FIXO da escala das barras de chuva = maior chuva horária dos últimos
  // 365 dias para esta cidade (histMaxByCity). Assim a mesma quantidade tem a
  // mesma altura em todos os dias e dá para comparar os dias entre si. Enquanto
  // o histórico não chega, usa o pico da semana como fallback.
  let weekMaxMM = 0;
  cd.daily.forEach(day => {
    (cd.hourlyByDay[day.date] || []).forEach(h => { if (h.mm > weekMaxMM) weekMaxMM = h.mm; });
  });
  const hist = histMaxByCity[cd.city.id];
  const scaleMax = (typeof hist === 'number' && hist > 0) ? hist : weekMaxMM;

  // Escala vertical de temperatura PADRONIZADA: mín/máx de toda a semana,
  // incluindo os alvos da estação (20/22/24) caso não sejam atingidos. Assim
  // todos os dias usam a mesma régua e ficam comparáveis entre si.
  let weekTMin = Infinity, weekTMax = -Infinity, setLo = Infinity, setHi = -Infinity;
  cd.daily.forEach(day => {
    (cd.hourlyByDay[day.date] || []).forEach(h => {
      if (h.temp < weekTMin) weekTMin = h.temp;
      if (h.temp > weekTMax) weekTMax = h.temp;
    });
    const sp = seasonSetpoint(day.date, cd.city.lat);
    if (sp < setLo) setLo = sp;
    if (sp > setHi) setHi = sp;
  });
  const yLowG  = Math.min(weekTMin, setLo);
  const yHighG = Math.max(weekTMax, setHi);

  cd.daily.forEach((day, di) => {
    let hours = cd.hourlyByDay[day.date] || [];
    const next = cd.daily[di + 1];               // 24h = 00h do dia seguinte (o último dia morre em 23h)
    if (next) {
      const nh = (cd.hourlyByDay[next.date] || [])[0];
      if (nh) hours = hours.concat([{ ...nh, hour: 24 }]);
    }
    if (hours.length < 2) return;
    wrap.insertAdjacentHTML('beforeend', buildRow(day, hours, day.date === todayISO, scaleMax, cd.city.lat, yLowG, yHighG));
  });

  const c = cd.city;
  document.getElementById('footLoc').textContent =
    `📍 ${cityName(c)} · ${c.lat.toFixed(2)}°, ${c.lon.toFixed(2)}°`;
  document.title = `Previsão · ${cityName(c)}`;
}

/* ──── Build one row with SVG sparkline ──── */
function buildRow(day, hours, isToday, scaleMax, lat, yLowG, yHighG){
  // Temperatura-alvo de interior para a estação do dia (verão 24°, inverno 20°,
  // primavera/outono 22°), com hemisfério pela latitude (estações invertidas
  // no Brasil). Vale para a linha de referência e para o verde do gradiente.
  const setpoint = seasonSetpoint(day.date, lat);
  const dt = new Date(day.date + 'T12:00:00');
  const dow = isToday ? T().today : T().dow[dt.getDay()];
  const dnum = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
  const [emo, emoDesc] = wmo(dominantDayCode(hours, day.code));   // clima prevalente 8h–20h (tempestade tem prioridade)

  const temps = hours.map(h => h.temp);
  const mms   = hours.map(h => h.mm);
  const n     = temps.length;

  const tMin = Math.min(...temps), tMax = Math.max(...temps);
  const iMin = temps.indexOf(tMin), iMax = temps.indexOf(tMax);

  const W = 240, H = 60, GUT = 14, VBW = W + GUT;
  const WIND_H = 12;                             // wind SVG viewBox height
  const padT = 6;
  const WIND_BASE = 2, WIND_SPAN = 8;
  const padB = 4;
  const ch = H - padT - padB;                   // temperature usable height (= 50)

  // Escala vertical PADRONIZADA da semana (mesma régua em todos os dias), já
  // incluindo os alvos da estação. Em dias frios a curva fica embaixo (linha-
  // alvo no alto, sem ser alcançada); em dias quentes, em cima; tudo comparável.
  const yLow  = yLowG;
  const yHigh = yHighG;
  const yRange = Math.max(0.5, yHigh - yLow);

  // Geometria horizontal: passo entre horas = VBW/(n+1). Reservamos 1,5 passo à
  // ESQUERDA (slot para o relógio da legenda) e 0,5 passo à direita, de modo que
  // a 00h não fica cortada, a última hora chega à borda e as bolas de cada hora
  // continuam tangentes entre si.
  const stepX = (n === 1) ? 0 : VBW / (n + 1.5);
  const padXL = 2 * stepX;
  const xAt = i => (n === 1 ? VBW / 2 : padXL + i * stepX);
  const yAt = t => padT + ch * (1 - (t - yLow) / yRange);

  // Diâmetro das bolas e fonte da legenda de horas, em cqw (% da largura do
  // gráfico) para acompanhar a tela. Diâmetro da bola = passo entre horas
  // (tangentes); a fonte das horas usa o mesmo tamanho das bolas de temperatura.
  const dotPct = (n === 1) ? 20 : 100 / (n + 1);
  const ballPct = dotPct * 0.75;                // 3/4 da largura de cada faixa de hora
  const fcqw   = (ballPct * 0.8).toFixed(2);   // fonte ampla — pode leve overflow do círculo

  // ── Única linha horizontal de referência: a temperatura-alvo da estação atual. ──
  const degLinesSvg = `<line x1="0" y1="${yAt(setpoint).toFixed(1)}" x2="${VBW}" y2="${yAt(setpoint).toFixed(1)}" stroke="#3fb950" stroke-opacity=".55" stroke-width="1" vector-effect="non-scaling-stroke"><title>${T().targetTitle}: ${setpoint}°</title></line>`;

  // ── Grade vertical por hora (3 em 3 h mais marcada; a hora ATUAL, só no
  //    dia de hoje, fica realçada). ──
  const nowH = new Date().getHours();
  const hourGrid = hours.map((h, i) => {
    const x = xAt(i).toFixed(1);
    const isNow = isToday && h.hour === nowH;
    const cls = isNow ? 'g-now' : (h.hour % 3 === 0 ? 'g-maj' : 'g-min');
    return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${(padT+ch).toFixed(1)}" class="${cls}" stroke-width="${isNow ? '1.6' : '1'}" vector-effect="non-scaling-stroke"/>`;
  }).join('');

  // ── Força do vento por hora: barrinha na base, altura e opacidade ∝ velocidade ──
  const WIND_MAX = 35;                              // km/h ~ barra cheia
  const wBarW = stepX * 0.9;
  const windBars = hours.map((h, i) => {
    const frac = clamp((h.wind || 0) / WIND_MAX, 0, 1);
    if (frac < 0.04) return '';
    const hgt = WIND_BASE + WIND_SPAN * frac;       // 2..10 unidades
    const op  = (0.18 + 0.6 * frac).toFixed(2);
    const tip = `${T().windLabel} ${String(h.hour).padStart(2,'0')}h: ${Math.round(h.wind||0)} km/h`;
    return `<rect x="${(xAt(i) - wBarW/2).toFixed(1)}" y="${(WIND_H - hgt).toFixed(1)}" width="${wBarW.toFixed(1)}" height="${hgt.toFixed(1)}" fill="#9aa7d6" opacity="${op}"><title>${tip}</title></rect>`;
  }).join('');

  // Pico de vento do dia (a velocidade vai dentro da bolinha no ponto de leitura).
  let iWindMax = 0, windMax = 0;
  hours.forEach((h, i) => { const w = h.wind || 0; if (w > windMax) { windMax = w; iWindMax = i; } });
  const windFrac = clamp(windMax / WIND_MAX, 0, 1);
  const windTopY = WIND_H - (WIND_BASE + WIND_SPAN * windFrac);

  // ── Chuva: cada hora com chuva preenche a ALTURA TODA com hachura de linhas
  //    tracejadas inclinadas (simula chuva). Inclinação ∝ vento; densidade e
  //    espessura ∝ quantidade (relativa ao teto fixo de 365 dias); opacidade ∝
  //    probabilidade. ──
  const rainScaleMax = Math.max(scaleMax || 0, 0.1);
  const rBarW = stepX * 0.9;
  const rainDefs = [], rainRects = [];
  mms.forEach((m, i) => {
    if (m <= 0.05) return;
    const pop  = hours[i].pop  || 0;
    const wind = hours[i].wind || 0;
    const frac = clamp(m / rainScaleMax, 0, 1);
    const spacing = 6 - 4 * frac;                   // mais chuva → linhas mais juntas
    const thick   = (0.5 + 1.7 * frac).toFixed(2);  // mais chuva → linhas mais grossas
    const angle   = clamp(wind * 1.1, 8, 60).toFixed(0); // mais vento → mais inclinada
    const op      = Math.max(0.14, (pop / 100) * 0.85).toFixed(2); // probabilidade
    const x = (xAt(i) - rBarW/2).toFixed(1);
    const pid = `rn${day.date.replace(/-/g,'')}_${currentIdx}_${i}`;
    rainDefs.push(`<pattern id="${pid}" patternUnits="userSpaceOnUse" width="${spacing.toFixed(2)}" height="${spacing.toFixed(2)}" patternTransform="rotate(${angle})"><line x1="0" y1="-0.5" x2="0" y2="${(spacing+0.5).toFixed(2)}" class="rain-hatch" stroke-width="${thick}" stroke-dasharray="${(spacing*0.5).toFixed(2)} ${(spacing*0.55).toFixed(2)}"/></pattern>`);
    const rainTip = `${T().rainLabel} ${String(hours[i].hour).padStart(2,'0')}h: ${m.toFixed(1)} mm · ${Math.round(pop)}% ${T().probLabel}`;
    rainRects.push(`<rect x="${x}" y="${padT}" width="${rBarW.toFixed(1)}" height="${ch}" fill="url(#${pid})" opacity="${op}"><title>${rainTip}</title></rect>`);
  });
  const rainDefsSvg = rainDefs.join('');
  const rainSvg = rainRects.join('');

  const pts = temps.map((t, i) => `${xAt(i).toFixed(1)},${yAt(t).toFixed(1)}`);
  const linePath = 'M' + pts.join(' L');

  const gid = 'g' + day.date.replace(/-/g,'') + '_' + currentIdx;

  // Gradiente da linha de temperatura: vermelho (quente) → verde (alvo) → azul (frio).
  const tgid = 't' + gid;
  const oSet = (1 - (setpoint - yLow) / yRange);
  let tempStops;
  if (oSet <= 0)      tempStops = '<stop offset="0%" stop-color="#3fb950"/><stop offset="100%" stop-color="#4aa8ff"/>';
  else if (oSet >= 1) tempStops = '<stop offset="0%" stop-color="#ff5b4a"/><stop offset="100%" stop-color="#3fb950"/>';
  else                tempStops = `<stop offset="0%" stop-color="#ff5b4a"/><stop offset="${(oSet*100).toFixed(1)}%" stop-color="#3fb950"/><stop offset="100%" stop-color="#4aa8ff"/>`;

  // Cores dos rótulos de máx/mín: se a máxima não alcança o alvo, fica verde (em
  // vez de vermelho); se a mínima fica acima do alvo, verde (em vez de azul).
  const maxCol = (tMax < setpoint) ? '#3fb950' : '#ff5b4a';
  const minCol = (tMin > setpoint) ? '#3fb950' : '#4aa8ff';

  // Há chuva relevante no dia? (prob >30% e >0,5mm) → aviso ao lado do dia.
  // (ignora a 24h, que é dado do dia seguinte)
  const needRainAction = hours.some(h => h.hour < 24 && h.pop > 30 && h.mm > 0.5);

  // Horas que recebem cor na legenda: máx/mín de temperatura (suas cores), pico
  // de vento (cor do vento) e horas de chuva (cor da chuva, se não forem máx/mín).
  // Conjuntos de horas com temperatura máxima e mínima (podem repetir-se).
  const maxHourSet = new Set(hours.filter(h => h.temp === tMax).map(h => h.hour));
  const minHourSet = new Set(hours.filter(h => h.temp === tMin).map(h => h.hour));
  const windHour = windMax > 0 ? hours[iWindMax].hour : -1;
  const rainHourSet = new Set(hours.filter(h => h.hour < 24 && h.pop > 30 && h.mm > 0.5).map(h => h.hour));
  const hourColor = (h) => {
    if (maxHourSet.has(h.hour)) return maxCol;
    if (minHourSet.has(h.hour)) return minCol;
    if (h.hour === windHour) return '#9aa7d6';
    if (rainHourSet.has(h.hour)) return 'var(--rain)';
    return '';
  };

  // Legenda com TODAS as horas (00–24), abaixo de cada dia; e também acima no
  // dia de hoje. As horas-chave (máx/mín/vento/chuva) saem coloridas.
  const icoCqw = (dotPct * 0.9).toFixed(2);
  const hourAxisHTML = `
        <div class="hour-axis dense">
          <span class="axis-ico" title="${T().today === 'Hoje' ? 'Horas' : 'Ore'} (00–24)" style="font-size:clamp(8px, ${icoCqw}cqw, 0.9rem)">⏰</span>
          ${hours.map((h, i) => {
            const pct = xAt(i) / VBW * 100;
            const base = `left:${pct.toFixed(1)}%;transform:translateX(-50%);font-size:clamp(7px,${fcqw}cqw,0.85rem)`;
            const col = hourColor(h);
            const isNow = isToday && h.hour === nowH;
            const extra = (col ? `;color:${col};font-weight:700` : '') + (isNow ? `;font-weight:800${col ? '' : ';color:var(--text)'}` : '');
            return `<span class="${isNow ? 'now' : ''}" style="${base}${extra}">${String(h.hour).padStart(2,'0')}</span>`;
          }).join('')}
        </div>`;

  // Uma bola POR HORA com a temperatura dentro, na cor do gradiente daquela
  // temperatura. O diâmetro = espaçamento entre horas (em cqw, relativo à
  // largura do gráfico) → as bolas ficam tangentes, escalando com a tela.
  const GRAPH = '#2b2f36';
  const tempBalls = hours.map((h, i) => {
    const hh  = String(h.hour).padStart(2,'0');
    const v   = Math.round(h.temp);
    const tip = `${T().tempLabel} ${hh}h: ${v}°`;
    const left = (xAt(i) / VBW * 100).toFixed(2);
    const top  = (yAt(h.temp) / H * 100).toFixed(1);
    const rgb  = tempColor(h.temp, setpoint, yLow, yHigh);
    // Bola cheia SÓ na máx/mín do dia (destaque). Nas demais horas, só o número
    // (cor da letra = gradiente da temperatura), com um halo que interrompe a
    // linha atrás dele para ler fácil — sem a poluição das bolas em toda hora.
    const da = `data-h="${h.hour}" data-t="${v}" data-w="${Math.round(h.wind||0)}" data-wd="${Math.round(h.windDir||0)}" data-pop="${Math.round(h.pop||0)}" data-mm="${(h.mm||0).toFixed(1)}"`;
    if (h.temp === tMax || h.temp === tMin) {
      // Máxima: vermelho se acima do alvo sazonal, verde se abaixo.
      // Mínima: azul se abaixo do alvo sazonal, verde se acima.
      const ballBg = (h.temp === tMax) ? maxCol : minCol;
      return `<span class="t-ball" ${da} style="left:${left}%;top:${top}%;width:min(${ballPct.toFixed(2)}cqw, 26cqh);font-size:${fcqw}cqw;background:${ballBg};color:${GRAPH}">${v}</span>`;
    }
    return `<span class="t-num" ${da} style="left:${left}%;top:${top}%;font-size:${fcqw}cqw;color:rgb(${rgb})">${v}</span>`;
  }).join('');

  // Bola do PICO de vento do dia (no topo da barra mais alta), com a velocidade.
  // Mesmo tamanho e estilo que os números de temperatura (t-num), na cor das barras.
  const windBall = windMax > 0
    ? `<span class="t-num" data-h="${hours[iWindMax].hour}" data-t="${Math.round(hours[iWindMax].temp)}" data-w="${Math.round(windMax)}" data-wd="${Math.round(hours[iWindMax].windDir||0)}" data-pop="${Math.round(hours[iWindMax].pop||0)}" data-mm="${(hours[iWindMax].mm||0).toFixed(1)}" title="${T().windPeak} ${Math.round(windMax)} km/h · ${String(hours[iWindMax].hour).padStart(2,'0')}h" style="left:${(xAt(iWindMax)/VBW*100).toFixed(2)}%;top:${(windTopY/WIND_H*100).toFixed(1)}%;font-size:${fcqw}cqw;color:#9aa7d6">${Math.round(windMax)}</span>`
    : '';

  // Ícones de série no slot reservado à esquerda: 🌡️ na altura em que a linha de
  // temperatura começa e 💨 na faixa das barras de vento — identificam o que é
  // cada série, alinhados com o relógio 🕐 da legenda de horas logo abaixo.
  const serIcoCqw = (dotPct * 0.4).toFixed(2);
  const icoX = (0.7 * dotPct).toFixed(2);             // centro do slot esquerdo (em %)
  const tempIcoTop = (yAt(temps[0]) / H * 100).toFixed(1);
  // clamp garante tamanho legível em mobile (mín. 10px) sem transbordar em desktop.
  const serIcoFs = `clamp(10px, ${serIcoCqw}cqw, 1rem)`;
  const tempIco = `<span class="ser-ico" title="${T().tempLabel}" style="left:${icoX}%;top:${tempIcoTop}%;font-size:${serIcoFs}">🌡️</span>`;
  // 💨 alinhado com o topo da barra de pico; clampado dentro da faixa das barras
  // (≥83% = mín da área de vento em relação ao viewBox H=60).
  const windIcoTop = clamp(windTopY / WIND_H * 100, 5, 85).toFixed(1);
  const windIco = windMax > 0
    ? `<span class="ser-ico" title="${T().windLabel} (km/h)" style="left:${icoX}%;top:${windIcoTop}%;font-size:${serIcoFs}">💨</span>`
    : '';

  return `
    <div class="row${isToday ? ' today' : ''}">
      <div class="c-date">
        <span class="dow">${dow}</span>
        <span class="dnum">${dnum}</span>
        <span class="emo" title="${emoDesc}">${emo}</span>
        ${needRainAction ? `<span class="day-rain" title="${T().rainAction}">💧</span>` : ''}
      </div>
      <div class="c-chart">
        <div class="wind-wrap">
          <svg class="spark" viewBox="0 0 ${VBW} ${WIND_H}" preserveAspectRatio="none">
            ${windBars}
          </svg>
          ${windBall}
          ${windIco}
        </div>
        ${hourAxisHTML}
        <div class="spark-wrap">
          <svg class="spark" viewBox="0 0 ${VBW} ${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="${tgid}" gradientUnits="userSpaceOnUse" x1="0" y1="${padT}" x2="0" y2="${(padT+ch).toFixed(1)}">
                ${tempStops}
              </linearGradient>
              ${rainDefsSvg}
            </defs>
            ${degLinesSvg}
            ${hourGrid}
            ${rainSvg}
            <path d="${linePath}" fill="none" stroke="url(#${tgid})" stroke-width="3"
                  vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"><title>${T().tempLabel}</title></path>
          </svg>
          ${tempBalls}
          ${tempIco}
        </div>
      </div>
    </div>
  `;
}

function formatHr(h){ return String(h).padStart(2,'0') + 'h'; }
function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

/* Ícone do dia = clima prevalente entre 8h e 20h (sol, nuvem, nublado, chuva ou
   tempestade), pela maior frequência das categorias dos códigos WMO horários.
   Em empate, prevalece a categoria mais significativa (tempestade > chuva > …). */
function dominantDayCode(hours, dailyCode){
  const dayHrs = hours.filter(h => h.hour >= 8 && h.hour <= 20);
  const src = dayHrs.length ? dayHrs : hours;
  const cat = c => {
    if (c >= 95) return 'storm';
    if ((c >= 51 && c <= 67) || (c >= 80 && c <= 82)) return 'rain';
    if ((c >= 71 && c <= 77) || c === 85 || c === 86) return 'snow';
    if (c === 45 || c === 48) return 'fog';
    if (c === 3) return 'cloud';
    if (c === 2) return 'partly';
    return 'clear';                              // 0, 1
  };
  const counts = {};
  let maxMm = 0;
  src.forEach(h => { const k = cat(h.code); counts[k] = (counts[k] || 0) + 1; if ((h.mm||0) > maxMm) maxMm = h.mm; });
  // Tempestade tem prioridade: código diário de trovoada, qualquer hora de
  // trovoada no dia, ou chuva horária muito intensa (convectiva) → ⛈.
  if ((dailyCode != null && dailyCode >= 95) || (counts.storm || 0) >= 1 || maxMm >= 10) return 95;
  // senão, categoria mais frequente (empate → mais severa)
  const sev = ['clear','partly','cloud','fog','snow','rain'];
  let best = 'clear', bestN = 0;
  for (let i = sev.length - 1; i >= 0; i--) {
    const k = sev[i], c = counts[k] || 0;
    if (c > bestN) { bestN = c; best = k; }
  }
  const rep = { clear:0, partly:2, cloud:3, fog:45, rain:63, snow:73 };
  return rep[best];
}

/* Cor de uma temperatura na escala azul(frio)→verde(alvo)→vermelho(quente),
   coerente com o gradiente da linha. Retorna "r,g,b". */
function lerpRgb(a, b, t){
  return [Math.round(a[0]+(b[0]-a[0])*t), Math.round(a[1]+(b[1]-a[1])*t), Math.round(a[2]+(b[2]-a[2])*t)];
}
function tempColor(temp, setpoint, lo, hi){
  const COLD = [74,168,255], GREEN = [63,185,80], HOT = [255,91,74];
  let rgb;
  if (temp >= setpoint){
    const t = hi > setpoint ? clamp((temp - setpoint) / (hi - setpoint), 0, 1) : 0;
    rgb = lerpRgb(GREEN, HOT, t);
  } else {
    const t = setpoint > lo ? clamp((setpoint - temp) / (setpoint - lo), 0, 1) : 0;
    rgb = lerpRgb(GREEN, COLD, t);
  }
  return rgb.join(',');
}

/* Temperatura-alvo de interior conforme a estação ASTRONÔMICA da data (limites
   nos equinócios/solstícios ~20–21), com hemisfério pela latitude (negativa =
   Sul, estações invertidas): verão 24°, inverno 20°, primavera/outono 22°.
   Ex.: início de junho na Itália ainda é primavera (verão só a partir de ~21/06). */
function seasonSetpoint(dateISO, lat){
  const m = parseInt(dateISO.slice(5,7), 10);
  const d = parseInt(dateISO.slice(8,10), 10);
  const md = m * 100 + d;                        // ex.: 21/06 → 621
  let season;                                    // estação no Hemisfério Norte
  if      (md >= 320 && md <= 620) season = 'primavera';   // ~20/03 – 20/06
  else if (md >= 621 && md <= 922) season = 'verao';       // ~21/06 – 22/09
  else if (md >= 923 && md <= 1220) season = 'outono';     // ~23/09 – 20/12
  else                              season = 'inverno';    // ~21/12 – 19/03
  if (lat < 0) {                                 // Hemisfério Sul → inverte
    season = { inverno:'verao', verao:'inverno', primavera:'outono', outono:'primavera' }[season];
  }
  if (season === 'verao')   return 24;
  if (season === 'inverno') return 20;
  return 22;                                     // primavera e outono
}

function groupHours(hs){
  if (!hs.length) return '';
  const sorted = [...new Set(hs)].sort((a,b)=>a-b);
  const out = [];
  let s = sorted[0], p = sorted[0];
  for (let i = 1; i < sorted.length; i++){
    if (sorted[i] === p + 1) { p = sorted[i]; }
    else { out.push(s === p ? formatHr(s) : `${formatHr(s)}-${formatHr(p)}`); s = p = sorted[i]; }
  }
  out.push(s === p ? formatHr(s) : `${formatHr(s)}-${formatHr(p)}`);
  return out.join(' ');
}

function showError(msg){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('error').style.display = 'flex';
}
