<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Previsão 7 dias</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0b1220;
    --surface:#141c2e;
    --surface2:#1c2740;
    --border:#2a3550;
    --text:#e6edf6;
    --muted:#8b96b0;
    --temp:#ff8c42;
    --prob:#4aa8ff;
    --mm:#7ee3c1;
    --today:#3fb950;
    /* cores das linhas de grade (tema-aware) */
    --grid-min:rgba(255,255,255,.045);
    --grid-maj:rgba(255,255,255,.13);
    --grid-ref:rgba(255,255,255,.05);
    --grid-cross:rgba(255,255,255,.18);
    --rain:#8fe9cf;                /* hachura de chuva (tema-aware) */
  }

  /* ─── Tema claro ─── */
  html[data-theme="light"]{
    --bg:#e7edf5;
    --surface:#ffffff;
    --surface2:#eef3fa;
    --border:#ccd6e4;
    --text:#16202f;
    --muted:#5d6b82;
    --grid-min:rgba(0,0,0,.06);
    --grid-maj:rgba(0,0,0,.16);
    --grid-ref:rgba(0,0,0,.08);
    --grid-cross:rgba(0,0,0,.22);
    --rain:#2c8fb0;                /* tom de água, mais escuro p/ aparecer no claro */
  }
  html[data-theme="light"] body{ background:#e7edf5; }
  html[data-theme="light"] .app{ background:#ffffff; }
  html[data-theme="light"] .city-btn.active{
    background:linear-gradient(160deg,#dcefff,#eef3fa);
    box-shadow:0 0 0 1px rgba(74,168,255,.25), 0 4px 14px rgba(74,168,255,.18);
  }
  html[data-theme="light"] .home-button-fixed{
    background:linear-gradient(135deg,#e9f4ff,#d6e9fb);
    color:#1e6fa8;
  }

  /* linhas de grade do SVG (cor pelo tema) */
  .g-min{ stroke:var(--grid-min); }
  .g-maj{ stroke:var(--grid-maj); }
  .g-ref{ stroke:var(--grid-ref); }
  .g-cross{ stroke:var(--grid-cross); }
  .rain-hatch{ stroke:var(--rain); }   /* cor da hachura de chuva pelo tema */

  /* ─── Barra superior: idioma + tema (oculta no topo ao abrir) ─── */
  .topbar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; gap:12px;
    padding:10px;
  }
  .lang-switch{
    display:flex; gap:3px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:999px; padding:3px;
  }
  .lang-btn{
    border:none; background:transparent; color:var(--muted);
    font-family:inherit; font-size:.72rem; font-weight:700; cursor:pointer;
    padding:5px 13px; border-radius:999px;
    transition:background .15s, color .15s;
  }
  .lang-btn.active{ background:var(--prob); color:#fff; }
  .theme-btn{
    border:1px solid var(--border); background:var(--surface2); color:var(--text);
    font-family:inherit; font-size:.72rem; font-weight:700; cursor:pointer;
    padding:6px 15px; border-radius:999px;
  }

  html{overscroll-behavior:none}
  body{
    background:radial-gradient(1200px 800px at 0% 0%,#172241 0%,var(--bg) 60%);
    background-attachment:fixed;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100dvh;
    display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Primeira "tela" — mantém o gráfico ocupando o viewport; o rodapé do site e
     o botão home ficam abaixo e aparecem ao rolar. */
  .screen{ min-height:100dvh; display:flex; flex-direction:column; }

  /* Rodapé padrão do site (revelado ao rolar) */
  .site-footer{
    flex:0 0 auto; text-align:center;
    color:var(--muted); font-size:.72rem;
    padding:18px 14px 88px;   /* espaço extra embaixo para o botão home aparecer abaixo do rodapé */
  }
  .site-footer p{ margin:0; }
  .site-footer .footer-meta{ margin-top:6px; display:flex; justify-content:center; }
  .site-footer .footer-github-link{
    display:inline-flex; align-items:center; gap:5px;
    color:var(--muted); text-decoration:none; font-size:.68rem;
  }
  .site-footer .footer-github-link:hover{ color:var(--text); }
  .site-footer .footer-github-link svg{ width:13px; height:13px; fill:currentColor; }

  /* Botão home — só aparece (em degradê) ao rolar até perto do rodapé */
  .home-button-fixed{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#1d3759,#1c2740);
    border:1px solid var(--prob);
    box-shadow:0 8px 22px rgba(74,168,255,.28);
    color:var(--prob); text-decoration:none;
    opacity:0; pointer-events:none;
    transition:opacity .28s ease, transform .2s ease;
    z-index:60;
  }
  .home-button-fixed:hover{ transform:translateX(-50%) scale(1.08); }
  .home-button-fixed svg{ width:24px; height:24px; fill:currentColor; }

  /* ─── City buttons (header) ─── */
  .cities{
    flex:0 0 auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    padding:6px 6px;
    border-bottom:1px solid var(--border);
  }
  .city-btn{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:5px 3px 5px;
    display:flex;flex-direction:column;align-items:center;gap:1px;
    color:var(--text);
    font-family:inherit;
    cursor:pointer;
    transition:background .12s,border-color .12s,transform .08s;
    min-width:0;text-align:center;
    -webkit-tap-highlight-color:transparent;
  }
  .city-btn:hover{background:var(--surface)}
  .city-btn:active{transform:scale(.96)}
  .city-btn.active{
    background:linear-gradient(160deg,#1d3759,#1c2740);
    border-color:var(--prob);
    box-shadow:0 0 0 1px rgba(74,168,255,.25), 0 4px 14px rgba(74,168,255,.18);
  }
  .cb-row1{display:flex;align-items:center;gap:3px;line-height:1}
  .cb-name{
    font-size:.62rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;
  }
  .cb-emoji{font-size:.78rem;line-height:1}
  .cb-temp{
    font-size:1.15rem;font-weight:300;color:var(--temp);
    letter-spacing:-1px;line-height:1;margin-top:2px;
  }
  .cb-meta{
    font-size:.54rem;color:var(--muted);
    line-height:1.1;margin-top:1px;
    white-space:nowrap;
  }
  .city-btn.active .cb-meta{color:#b9c5dd}
  .city-btn.loading .cb-temp,.city-btn.loading .cb-meta{opacity:.4}

  /* ─── Column headers ─── */
  .col-head{
    flex:0 0 auto;
    display:grid;
    grid-template-columns: 60px 1fr;
    gap:6px;
    padding:5px 10px;
    font-size:.6rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .col-head .c-chart{display:flex;justify-content:space-between;align-items:center}
  .legend{display:flex;gap:8px;text-transform:none;letter-spacing:0;font-size:.6rem}
  .lg{display:flex;align-items:center;gap:3px}
  .lg .dot{width:6px;height:6px;border-radius:50%}
  .lg .bar{width:8px;height:5px;border-radius:1px}

  /* ─── Days table ─── */
  .days{
    flex:1 1 auto;
    min-height:0;
    display:flex;flex-direction:column;
  }
  .row{
    flex:1 1 0;
    display:grid;
    grid-template-columns: 60px 1fr;
    gap:6px;
    align-items:center;
    padding:4px 10px;
    border-bottom:1px solid var(--border);
    min-height:0;
  }
  .row:last-child{border-bottom:none}
  .row.today{background:linear-gradient(90deg,rgba(63,185,80,.08),transparent 60%)}

  .c-date{display:flex;flex-direction:column;line-height:1.1;min-width:0}
  .dow{font-size:.78rem;font-weight:700}
  .row.today .dow{color:#3fb950}
  .dnum{font-size:.62rem;color:var(--muted);margin-top:1px}
  .emo{font-size:.95rem;margin-top:1px}
  /* Aviso de chuva do dia (fechar janela / recolher roupa do varal) */
  .day-rain{font-size:.95rem;margin-top:2px;line-height:1;filter:drop-shadow(0 0 2px rgba(74,168,255,.5))}

  /* Chart cell */
  .c-chart{
    display:flex;flex-direction:column;
    height:100%;min-height:48px;gap:1px;min-width:0;
  }
  .spark-wrap{position:relative;flex:1 1 auto;min-height:0}
  .spark{width:100%;height:100%;display:block}
  /* Rótulos de valor: SEM fundo/borda; legibilidade por sombra de texto. */
  .lbl{
    position:absolute;
    font-size:.62rem;font-weight:700;line-height:1;
    pointer-events:none;white-space:nowrap;
    text-shadow:0 0 3px var(--bg),0 0 3px var(--bg),0 0 2px var(--bg);
  }
  .lbl-max{ color:#ff7a5c; }
  .lbl-min{ color:#7cc4ff; }
  .lbl-set{
    position:absolute; right:3px; transform:translateY(-50%);
    font-size:.6rem; font-weight:700; line-height:1;
    color:#9fe6b5; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 2px var(--bg),0 0 2px var(--bg);
  }

  /* Rótulos de grau (faixa livre à direita do gráfico), na cor da temperatura */
  .deg{
    position:absolute; right:2px; transform:translateY(-50%);
    font-size:.46rem; font-weight:700; line-height:1; white-space:nowrap;
    pointer-events:none;
    text-shadow:0 0 2px var(--bg), 0 0 2px var(--bg);
  }
  .deg-set{ font-size:.54rem; }

  /* Rótulo do pico de vento (sem fundo) */
  .lbl-wind{
    position:absolute;
    font-size:.5rem; font-weight:700; line-height:1; white-space:nowrap;
    color:#9aa7d6; pointer-events:none;
    text-shadow:0 0 3px var(--bg),0 0 3px var(--bg),0 0 2px var(--bg);
  }
  /* Hora discreta do cruzamento (puxada por um traço) */
  .ev-hr{
    position:absolute; transform:translate(-50%,-50%);
    font-size:.5rem; font-weight:700; line-height:1; white-space:nowrap;
    color:var(--muted); pointer-events:none;
    text-shadow:0 0 2px var(--bg),0 0 2px var(--bg);
  }

  /* Marcadores na posição da hora: cruzamento do alvo (▲/▼) e chuva (💧) */
  .cross-mark{
    position:absolute; transform:translate(-50%,-50%);
    font-size:.62rem; font-weight:700; line-height:1; pointer-events:none;
    text-shadow:0 0 2px var(--bg), 0 0 2px var(--bg);
  }
  .rain-mark{
    position:absolute; top:1px; transform:translateX(-50%);
    font-size:.6rem; line-height:1; pointer-events:none;
  }

  /* Trigger strip */
  .triggers{
    flex:0 0 auto;
    display:flex;gap:7px;
    font-size:.56rem;line-height:1;
    white-space:nowrap;overflow:hidden;
    padding:1px 0 0;font-weight:700;
    min-height:9px;
  }
  .trig-up   { color:#ff6b4a; }
  .trig-dn   { color:#5edaff; }
  .trig-rain { color:var(--mm); }

  /* Eixo de horas (só sob o dia de hoje) */
  .hour-axis{
    position:relative;
    flex:0 0 auto;
    height:10px;
    margin-top:1px;
  }
  .hour-axis span{
    position:absolute;
    top:0;
    font-size:.5rem;
    line-height:1;
    color:var(--muted);
    white-space:nowrap;
  }

  /* Stats cell */
  .c-stats{
    display:flex;flex-direction:column;align-items:flex-end;
    line-height:1.15;font-size:.66rem;
  }
  .stat-pop{color:var(--prob)}
  .stat-pop.dry{color:var(--muted)}
  .stat-mm{color:var(--mm);margin-top:1px}
  .stat-mm.zero{color:var(--muted)}

  /* ─── Footer ─── */
  .footer{
    flex:0 0 auto;
    padding:4px 10px;
    font-size:.58rem;color:var(--muted);
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--border);
  }
  .footer a{color:var(--muted)}

  /* ─── Loading / Error ─── */
  .overlay{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;z-index:50;padding:24px;text-align:center;
  }
  .spinner{
    width:34px;height:34px;border:3px solid var(--border);
    border-top-color:var(--prob);border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-ico{font-size:2.4rem}
  .err-msg{color:var(--muted);font-size:.85rem;max-width:300px}
  .btn{background:var(--prob);color:#fff;border:none;border-radius:8px;
       padding:9px 18px;font-size:.85rem;cursor:pointer;font-family:inherit}

  /* ─── Desktop ─── */
  @media (min-width:768px){
    body{background:#070b14}
    .screen{align-items:center;justify-content:center}
    .app{
      width:min(100%,860px);
      height:min(100dvh,740px);
      border:1px solid var(--border);border-radius:18px;
      overflow:hidden;display:flex;flex-direction:column;
      background:radial-gradient(900px 600px at 0% 0%,#172241 0%,var(--bg) 60%);
      box-shadow:0 24px 60px rgba(0,0,0,.5);
    }
    .cities{padding:10px 14px;gap:10px}
    .city-btn{padding:9px 6px;border-radius:12px}
    .cb-name{font-size:.78rem;max-width:none}
    .cb-emoji{font-size:1rem}
    .cb-temp{font-size:1.6rem;margin-top:4px}
    .cb-meta{font-size:.7rem;margin-top:3px}
    .col-head, .row{grid-template-columns: 80px 1fr;padding-left:18px;padding-right:18px}
    .dow{font-size:.95rem}.dnum{font-size:.72rem}.emo{font-size:1.15rem}.day-rain{font-size:1.15rem}
    .lbl{font-size:.72rem}
    .lbl-set{font-size:.72rem}
    .deg{font-size:.58rem}
    .deg-set{font-size:.66rem}
    .lbl-wind{font-size:.62rem}
    .ev-hr{font-size:.58rem}
    .cross-mark{font-size:.74rem}
    .rain-mark{font-size:.72rem}
    .c-stats{font-size:.78rem}
    .triggers{font-size:.68rem;min-height:11px;gap:10px}
    .hour-axis{height:12px}
    .hour-axis span{font-size:.62rem}
    .footer{padding:8px 18px;font-size:.7rem}
  }
  @media (max-width:767px){.app{flex:1;display:flex;flex-direction:column;min-height:0}}
  @media (max-height:480px){
    .cities{padding:3px 4px;gap:3px}
    .city-btn{padding:3px 2px}
    .cb-temp{font-size:.95rem}
    .cb-meta{display:none}
    .triggers{display:none}
    .hour-axis{display:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="lang-switch">
    <button type="button" class="lang-btn" data-lang="pt-BR">PT</button>
    <button type="button" class="lang-btn" data-lang="it-IT">IT</button>
  </div>
  <button type="button" class="theme-btn" id="themeBtn">Light</button>
</div>

<div class="screen">
  <div class="app" id="app" style="display:none;flex:1;flex-direction:column;min-height:0">

    <nav class="cities" id="cityBtns"></nav>

    <main class="days" id="days"></main>

    <footer class="footer">
      <span id="footLoc">📍 —</span>
      <span><span id="sourceLbl">Fonte: </span><a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></span>
    </footer>
  </div>
</div>

<footer class="site-footer">
  <p id="footerBrand">💻 Portfólio Engenharia NATA @ 2026</p>
  <div class="footer-meta">
    <a class="footer-github-link" href="https://github.com/souonata/EngenhariaNata" target="_blank" rel="noopener noreferrer" aria-label="GitHub EngenhariaNata">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.58 7.58 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      <span>github.com/souonata/EngenhariaNata</span>
    </a>
  </div>
</footer>

<a href="../index.html" class="home-button-fixed" title="Voltar para a tela inicial" aria-label="Voltar para a tela inicial">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
  </svg>
</a>

<div id="loading" class="overlay">
  <div class="spinner"></div>
  <div class="err-msg" id="loadingMsg">Carregando previsão…</div>
</div>

<div id="error" class="overlay" style="display:none">
  <div class="err-ico">⚠️</div>
  <div class="err-msg" id="errMsg">Erro ao carregar dados.</div>
  <button class="btn" id="retryBtn" onclick="location.reload()">Tentar novamente</button>
</div>

<script>
/* ============================================================
   Open-Meteo — API meteorológica europeia, gratuita, sem chave
   Múltiplas coordenadas em uma única requisição.
   ============================================================ */

const CITIES = [
  { id:'milao',     name:'Milão',     nameIt:'Milano', lat: 45.4642, lon:   9.1900 },
  { id:'turate',    name:'Turate',    lat: 45.7333, lon:   9.0500 },
  { id:'curitiba',  name:'Curitiba',  lat:-25.4284, lon: -49.2733 },
  { id:'bauru',     name:'Bauru',     lat:-22.3147, lon: -49.0606 },
  { id:'duartina',  name:'Duartina',  lat:-22.4150, lon: -49.4080 },
  { id:'camboriu',  name:'B. Camboriú', lat:-26.9906, lon: -48.6347 },
  { id:'recife',    name:'Recife',    lat: -8.0539, lon: -34.8811 },
];
const LS_CITY = 'previsao_city_v1';
const LS_HISTMAX = 'previsao_histmax_v1';   // teto fixo da escala de chuva (máx. horário em 365 dias)
const HISTMAX_TTL_DAYS = 7;                 // revalida o histórico no máximo 1×/semana
/* i18n mínimo (PT/IT) — usa a mesma chave de idioma do site (engnata_idioma). */
const I18N = {
  'pt-BR': {
    loading:'Carregando previsão…', error:'Erro ao carregar dados.', retry:'Tentar novamente',
    today:'Hoje', dow:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
    source:'Fonte', footer:'💻 Portfólio Engenharia NATA @ 2026',
    home:'Voltar para a tela inicial', targetTitle:'Temperatura-alvo de interior',
    upTitle:'Temperatura sobe acima do alvo', dnTitle:'Temperatura cai abaixo do alvo',
    rainTitle:'Chuva: prob >30% e >0,5mm',
    rainAction:'Vai chover — feche a janela e recolha a roupa do varal'
  },
  'it-IT': {
    loading:'Caricamento previsioni…', error:'Errore nel caricamento dei dati.', retry:'Riprova',
    today:'Oggi', dow:['Dom','Lun','Mar','Mer','Gio','Ven','Sab'],
    source:'Fonte', footer:'💻 Portafoglio Ingegneria NATA @ 2026',
    home:'Torna alla schermata iniziale', targetTitle:'Temperatura interna obiettivo',
    upTitle:'La temperatura sale sopra l\'obiettivo', dnTitle:'La temperatura scende sotto l\'obiettivo',
    rainTitle:'Pioggia: prob >30% e >0,5mm',
    rainAction:'Pioggia in arrivo — chiudi la finestra e ritira il bucato'
  }
};
let LANG = (() => { try { const s = sessionStorage.getItem('engnata_idioma'); return (s === 'it-IT' || s === 'pt-BR') ? s : 'pt-BR'; } catch (e) { return 'pt-BR'; } })();
const T = () => I18N[LANG];
const cityName = c => (LANG.startsWith('it') && c.nameIt) ? c.nameIt : c.name;

/* Tema: usa a mesma chave do site (engnata_theme_mode, em JSON). O previsao é
   dark por padrão; só vira light com data-theme="light". */
let THEME = (() => { try { return JSON.parse(localStorage.getItem('engnata_theme_mode')) || 'dark'; } catch (e) { return 'dark'; } })();

let cityData = [];              // dados de cada cidade (índices alinhados com CITIES)
let currentIdx = Math.max(0, CITIES.findIndex(c => c.id === localStorage.getItem(LS_CITY)));

// Máx. horário de chuva (mm) dos últimos 365 dias, por cidade — usado como teto
// FIXO da escala das barras. Carrega do cache (mesmo se vencido) para uso imediato.
let histMaxByCity = (() => {
  try { const raw = JSON.parse(localStorage.getItem(LS_HISTMAX) || 'null'); return (raw && raw.values) || {}; }
  catch (e) { return {}; }
})();

/* ──── Boot ──── */
applyTheme(false);   // aplica o tema antes de tudo (inclui a tela de carregamento)
applyLangStatic();   // textos fixos (loading/erro/rodapé/home) no idioma atual
wireControls();      // botões de idioma e tema

(async function init(){
  buildCityButtonShells();
  try {
    await loadAll();
    ensureHistMax();      // em background: atualiza o teto da escala e re-renderiza
    setupHomeFade();      // botão home aparece em degradê só ao rolar até o rodapé
    scrollPastTopbar();   // abre já rolado abaixo da barra de idioma/tema (gráfico no topo)
  }
  catch (err) { showError(err.message); }
})();

/* ──── Idioma e tema ──── */
function applyTheme(persist){
  const html = document.documentElement;
  if (THEME === 'light') html.setAttribute('data-theme', 'light');
  else html.removeAttribute('data-theme');         // dark = base do app
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = THEME === 'light' ? 'Dark' : 'Light';
  if (persist) { try { localStorage.setItem('engnata_theme_mode', JSON.stringify(THEME)); } catch (e) {} }
}

function applyLangStatic(){
  const t = T();
  document.documentElement.lang = LANG;
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('loadingMsg', t.loading);
  set('errMsg', t.error);
  set('retryBtn', t.retry);
  set('footerBrand', t.footer);
  set('sourceLbl', t.source + ': ');
  const home = document.querySelector('.home-button-fixed');
  if (home) { home.title = t.home; home.setAttribute('aria-label', t.home); }
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === LANG));
}

function wireControls(){
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.lang === LANG) return;
      LANG = b.dataset.lang;
      try { sessionStorage.setItem('engnata_idioma', LANG); } catch (e) {}
      applyLangStatic();
      if (cityData.length) { renderCityButtons(); renderDays(); }
    });
  });
  const tbtn = document.getElementById('themeBtn');
  if (tbtn) tbtn.addEventListener('click', () => {
    THEME = THEME === 'light' ? 'dark' : 'light';
    applyTheme(true);
  });
}

function scrollPastTopbar(){
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  requestAnimationFrame(() => {
    const screen = document.querySelector('.screen');
    if (screen) screen.scrollIntoView({ block: 'start' });  // alinha o gráfico ao topo, escondendo a barra
  });
}

/* ──── Botão home: aparece em degradê de transparência conforme a página rola
   até perto do rodapé (abaixo do gráfico), deixando a tela limpa no topo. ──── */
function setupHomeFade(){
  const btn = document.querySelector('.home-button-fixed');
  if (!btn) return;
  const FAIXA = 100;   // px de transição da aparição perto do fundo
  const atualizar = () => {
    const doc = document.documentElement;
    const rolavel = doc.scrollHeight - window.innerHeight;
    let op;
    if (rolavel <= 4) {
      op = 1;                                   // não rola → sempre visível (fail-safe)
    } else {
      const distFundo = rolavel - window.scrollY;
      op = Math.min(1, Math.max(0, 1 - distFundo / FAIXA));
    }
    btn.style.opacity = op.toFixed(3);
    btn.style.pointerEvents = op > 0.05 ? 'auto' : 'none';
  };
  atualizar();
  window.addEventListener('scroll', atualizar, { passive: true });
  window.addEventListener('resize', atualizar);
}

/* ──── Constrói botões vazios (antes dos dados chegarem) ──── */

/* ──── Fetch (todas as cidades em uma requisição) ──── */
async function loadAll(){
  const url = new URL('https://api.open-meteo.com/v1/forecast');
  url.search = new URLSearchParams({
    latitude:  CITIES.map(c => c.lat).join(','),
    longitude: CITIES.map(c => c.lon).join(','),
    hourly:    'temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m',
    current:   'temperature_2m,apparent_temperature,weather_code,wind_speed_10m',
    daily:     'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max',
    timezone:  'auto',
    forecast_days: 7
  });

  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const arr = await res.json();
  // Sempre array com múltiplas coords
  const list = Array.isArray(arr) ? arr : [arr];

  cityData = CITIES.map((c, i) => {
    const d = list[i];
    const hourlyByDay = {};
    d.hourly.time.forEach((iso, k) => {
      const day = iso.slice(0,10);
      (hourlyByDay[day] = hourlyByDay[day] || []).push({
        hour: +iso.slice(11,13),
        temp: d.hourly.temperature_2m[k],
        pop:  d.hourly.precipitation_probability[k] ?? 0,
        mm:   d.hourly.precipitation[k] ?? 0,
        code: d.hourly.weather_code[k],
        wind: d.hourly.wind_speed_10m ? (d.hourly.wind_speed_10m[k] ?? 0) : 0
      });
    });
    const daily = d.daily.time.map((iso, k) => ({
      date: iso,
      tMax: d.daily.temperature_2m_max[k],
      tMin: d.daily.temperature_2m_min[k],
      mmSum: d.daily.precipitation_sum[k],
      popMax: d.daily.precipitation_probability_max[k] ?? 0,
      code: d.daily.weather_code[k]
    }));
    return { city:c, current:d.current, hourlyByDay, daily };
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderCityButtons();
  renderDays();
}

/* ──── Histórico: maior chuva horária (mm) dos últimos 365 dias por cidade ──── */
function histCacheFresh(){
  try {
    const raw = JSON.parse(localStorage.getItem(LS_HISTMAX) || 'null');
    if (!raw || !raw.date || !raw.values) return false;
    if (!CITIES.every(c => typeof raw.values[c.id] === 'number')) return false;
    const ageDays = (Date.now() - new Date(raw.date + 'T00:00:00').getTime()) / 86400000;
    return ageDays >= 0 && ageDays < HISTMAX_TTL_DAYS;
  } catch (e) { return false; }
}

async function fetchHistMax(){
  // API de arquivo histórico do Open-Meteo (latência de alguns dias → end = hoje-5).
  const end = new Date();   end.setDate(end.getDate() - 5);
  const start = new Date(end); start.setDate(start.getDate() - 364);
  const fmt = d => d.toISOString().slice(0, 10);

  const url = new URL('https://archive-api.open-meteo.com/v1/archive');
  url.search = new URLSearchParams({
    latitude:  CITIES.map(c => c.lat).join(','),
    longitude: CITIES.map(c => c.lon).join(','),
    start_date: fmt(start),
    end_date:   fmt(end),
    hourly:    'precipitation',
    timezone:  'auto'
  });

  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const arr = await res.json();
  const list = Array.isArray(arr) ? arr : [arr];

  const out = {};
  CITIES.forEach((c, i) => {
    const p = (list[i] && list[i].hourly && list[i].hourly.precipitation) || [];
    let m = 0;
    for (const v of p) { if (v != null && v > m) m = v; }
    out[c.id] = m;
  });
  return out;
}

async function ensureHistMax(){
  if (histCacheFresh()) return;            // cache ainda válido → não refaz a requisição pesada
  try {
    const vals = await fetchHistMax();
    histMaxByCity = vals;
    localStorage.setItem(LS_HISTMAX, JSON.stringify({ date: new Date().toISOString().slice(0,10), values: vals }));
    if (cityData.length) renderDays();      // re-renderiza com o teto histórico
  } catch (e) { /* mantém o fallback (semana) */ }
}

/* ──── WMO codes ──── */
function wmo(code){
  // Seletor de variação ️ (U+FE0F) força a apresentação COLORIDA do emoji; sem
  // ele, vários destes glifos viram texto monocromático (preto no tema claro).
  if (code === 0)              return ['☀️','Céu limpo'];
  if (code === 1)              return ['🌤️','Quase limpo'];
  if (code === 2)              return ['⛅','Parc. nublado'];
  if (code === 3)              return ['☁️','Nublado'];
  if (code === 45 || code===48)return ['🌫️','Nevoeiro'];
  if (code >= 51 && code <= 57)return ['🌦️','Chuvisco'];
  if (code === 61)             return ['🌧️','Chuva fraca'];
  if (code === 63)             return ['🌧️','Chuva'];
  if (code === 65)             return ['🌧️','Chuva forte'];
  if (code >= 66 && code <= 67)return ['🌧️','Chuva congel.'];
  if (code >= 71 && code <= 77)return ['❄️','Neve'];
  if (code >= 80 && code <= 82)return ['🌦️','Aguaceiros'];
  if (code === 85 || code===86)return ['🌨️','Aguac. neve'];
  if (code === 95)             return ['⛈️','Trovoada'];
  if (code >= 96 && code <= 99)return ['⛈️','Trov./granizo'];
  return ['🌡️','—'];
}

/* ──── Render days table ──── */
function renderDays(){
  const wrap = document.getElementById('days');
  const cd = cityData[currentIdx];
  wrap.innerHTML = '';
  const todayISO = cd.daily[0] ? cd.daily[0].date : new Date().toISOString().slice(0,10);

  // Teto FIXO da escala das barras de chuva = maior chuva horária dos últimos
  // 365 dias para esta cidade (histMaxByCity). Assim a mesma quantidade tem a
  // mesma altura em todos os dias e dá para comparar os dias entre si. Enquanto
  // o histórico não chega, usa o pico da semana como fallback.
  let weekMaxMM = 0;
  cd.daily.forEach(day => {
    (cd.hourlyByDay[day.date] || []).forEach(h => { if (h.mm > weekMaxMM) weekMaxMM = h.mm; });
  });
  const hist = histMaxByCity[cd.city.id];
  const scaleMax = (typeof hist === 'number' && hist > 0) ? hist : weekMaxMM;

  // Escala vertical de temperatura PADRONIZADA: mín/máx de toda a semana,
  // incluindo os alvos da estação (20/22/24) caso não sejam atingidos. Assim
  // todos os dias usam a mesma régua e ficam comparáveis entre si.
  let weekTMin = Infinity, weekTMax = -Infinity, setLo = Infinity, setHi = -Infinity;
  cd.daily.forEach(day => {
    (cd.hourlyByDay[day.date] || []).forEach(h => {
      if (h.temp < weekTMin) weekTMin = h.temp;
      if (h.temp > weekTMax) weekTMax = h.temp;
    });
    const sp = seasonSetpoint(day.date, cd.city.lat);
    if (sp < setLo) setLo = sp;
    if (sp > setHi) setHi = sp;
  });
  const yLowG  = Math.min(weekTMin, setLo);
  const yHighG = Math.max(weekTMax, setHi);

  cd.daily.forEach(day => {
    const hours = cd.hourlyByDay[day.date] || [];
    if (hours.length < 2) return;
    wrap.insertAdjacentHTML('beforeend', buildRow(day, hours, day.date === todayISO, scaleMax, cd.city.lat, yLowG, yHighG));
  });

  const c = cd.city;
  document.getElementById('footLoc').textContent =
    `📍 ${cityName(c)} · ${c.lat.toFixed(2)}°, ${c.lon.toFixed(2)}°`;
  document.title = `Previsão · ${cityName(c)}`;
}

/* ──── Build one row with SVG sparkline ──── */
function buildRow(day, hours, isToday, scaleMax, lat, yLowG, yHighG){
  // Temperatura-alvo de interior para a estação do dia (verão 24°, inverno 20°,
  // primavera/outono 22°), com hemisfério pela latitude (estações invertidas
  // no Brasil). Vale para a linha de referência e para o verde do gradiente.
  const setpoint = seasonSetpoint(day.date, lat);
  const dt = new Date(day.date + 'T12:00:00');
  const dow = isToday ? T().today : T().dow[dt.getDay()];
  const dnum = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
  const [emo] = wmo(dominantDayCode(hours, day.code));   // clima prevalente 8h–20h (tempestade tem prioridade)

  const temps = hours.map(h => h.temp);
  const mms   = hours.map(h => h.mm);
  const n     = temps.length;

  const tMin = Math.min(...temps), tMax = Math.max(...temps);
  const iMin = temps.indexOf(tMin), iMax = temps.indexOf(tMax);

  const W = 240, H = 60, GUT = 26, VBW = W + GUT;   // GUT = faixa livre à direita p/ os rótulos de grau
  const padT = 9, padB = 3;
  const ch = H - padT - padB;

  // Escala vertical PADRONIZADA da semana (mesma régua em todos os dias), já
  // incluindo os alvos da estação. Em dias frios a curva fica embaixo (linha-
  // alvo no alto, sem ser alcançada); em dias quentes, em cima; tudo comparável.
  const yLow  = yLowG;
  const yHigh = yHighG;
  const yRange = Math.max(0.5, yHigh - yLow);

  const xAt = i => (n === 1 ? W/2 : i * (W / (n - 1)));
  const yAt = t => padT + ch * (1 - (t - yLow) / yRange);

  // Posiciona um rótulo (sem fundo) junto ao ponto (xv,yv), deslocado em DIAGONAL
  // para dentro do plot. up=true → sobe (mín/vento); false → desce (máx). O lado
  // horizontal vai para o interior (se o ponto está à esquerda, desloca p/ direita).
  const diag = (xv, yv, up) => {
    const dx = (xv < W * 0.5) ? '6px' : 'calc(-100% - 6px)';
    const dy = up ? 'calc(-100% - 5px)' : '5px';
    return `left:${(xv/VBW*100).toFixed(1)}%;top:${(yv/H*100).toFixed(1)}%;transform:translate(${dx}, ${dy})`;
  };

  // ── Linhas horizontais por GRAU, coloridas pela cor da temperatura; o número
  //    de cada grau vai na faixa livre à direita, na mesma cor. ──
  const dLo = Math.ceil(yLow - 1e-6), dHi = Math.floor(yHigh + 1e-6);
  const degSpan = dHi - dLo;
  const labelStep = degSpan > 16 ? 3 : degSpan > 10 ? 2 : 1;   // evita rótulos sobrepostos em faixas grandes
  const degLines = [], degLabels = [];
  for (let d = dLo; d <= dHi; d++) {
    const y = yAt(d).toFixed(1);
    const col = tempColor(d, setpoint, yLow, yHigh);
    const isSet = (d === setpoint);
    degLines.push(`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="rgb(${col})" stroke-opacity="${isSet ? '.5' : '.16'}" stroke-width="1" vector-effect="non-scaling-stroke"/>`);
    if (isSet || (dHi - d) % labelStep === 0) {
      degLabels.push(`<span class="deg${isSet ? ' deg-set' : ''}" style="top:${(yAt(d)/H*100).toFixed(1)}%;color:rgb(${col})">${d}°</span>`);
    }
  }
  const degLinesSvg = degLines.join('');
  const degAxis = degLabels.join('');

  // ── Grade vertical por hora (de 3 em 3 h mais marcada) ──
  const hourGrid = hours.map((h, i) => {
    const x = xAt(i).toFixed(1);
    const major = (h.hour % 3 === 0);
    return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${(padT+ch).toFixed(1)}" class="${major ? 'g-maj' : 'g-min'}" stroke-width="1" vector-effect="non-scaling-stroke"/>`;
  }).join('');

  // ── Força do vento por hora: barrinha na base, altura e opacidade ∝ velocidade ──
  const WIND_MAX = 35;                              // km/h ~ barra cheia
  const wBarW = (W / n) * 0.92;
  const windBars = hours.map((h, i) => {
    const frac = clamp((h.wind || 0) / WIND_MAX, 0, 1);
    if (frac < 0.04) return '';
    const hgt = 1.5 + 5 * frac;                     // 1.5..6.5 unidades
    const op  = (0.18 + 0.6 * frac).toFixed(2);
    return `<rect x="${(xAt(i) - wBarW/2).toFixed(1)}" y="${(H - hgt).toFixed(1)}" width="${wBarW.toFixed(1)}" height="${hgt.toFixed(1)}" fill="#9aa7d6" opacity="${op}"/>`;
  }).join('');

  // Pico de vento do dia → ponto + valor/unidade/hora (km/h) no horário de maior intensidade.
  let iWindMax = 0, windMax = 0;
  hours.forEach((h, i) => { const w = h.wind || 0; if (w > windMax) { windMax = w; iWindMax = i; } });
  const windFrac = clamp(windMax / WIND_MAX, 0, 1);
  const windTopY = H - (1.5 + 5 * windFrac);            // topo da barra de pico (ponto de leitura)
  const windDot = windMax > 0
    ? `<circle cx="${xAt(iWindMax).toFixed(1)}" cy="${windTopY.toFixed(1)}" r="2" fill="#9aa7d6" vector-effect="non-scaling-stroke"/>`
    : '';
  const windLbl = windMax > 0
    ? `<span class="lbl-wind" style="${diag(xAt(iWindMax), windTopY, true)}">💨 ${Math.round(windMax)} · ${String(hours[iWindMax].hour).padStart(2,'0')}h</span>`
    : '';

  // ── Chuva: cada hora com chuva preenche a ALTURA TODA com hachura de linhas
  //    tracejadas inclinadas (simula chuva). Inclinação ∝ vento; densidade e
  //    espessura ∝ quantidade (relativa ao teto fixo de 365 dias); opacidade ∝
  //    probabilidade. ──
  const rainScaleMax = Math.max(scaleMax || 0, 0.1);
  const rBarW = (W / n) * 0.92;
  const rainDefs = [], rainRects = [];
  mms.forEach((m, i) => {
    if (m <= 0.05) return;
    const pop  = hours[i].pop  || 0;
    const wind = hours[i].wind || 0;
    const frac = clamp(m / rainScaleMax, 0, 1);
    const spacing = 6 - 4 * frac;                   // mais chuva → linhas mais juntas
    const thick   = (0.5 + 1.7 * frac).toFixed(2);  // mais chuva → linhas mais grossas
    const angle   = clamp(wind * 1.1, 8, 60).toFixed(0); // mais vento → mais inclinada
    const op      = Math.max(0.14, (pop / 100) * 0.85).toFixed(2); // probabilidade
    const x = (xAt(i) - rBarW/2).toFixed(1);
    const pid = `rn${day.date.replace(/-/g,'')}_${currentIdx}_${i}`;
    rainDefs.push(`<pattern id="${pid}" patternUnits="userSpaceOnUse" width="${spacing.toFixed(2)}" height="${spacing.toFixed(2)}" patternTransform="rotate(${angle})"><line x1="0" y1="-0.5" x2="0" y2="${(spacing+0.5).toFixed(2)}" class="rain-hatch" stroke-width="${thick}" stroke-dasharray="${(spacing*0.5).toFixed(2)} ${(spacing*0.55).toFixed(2)}"/></pattern>`);
    rainRects.push(`<rect x="${x}" y="${padT}" width="${rBarW.toFixed(1)}" height="${ch}" fill="url(#${pid})" opacity="${op}"/>`);
  });
  const rainDefsSvg = rainDefs.join('');
  const rainSvg = rainRects.join('');

  const pts = temps.map((t, i) => `${xAt(i).toFixed(1)},${yAt(t).toFixed(1)}`);
  const linePath = 'M' + pts.join(' L');

  const gid = 'g' + day.date.replace(/-/g,'') + '_' + currentIdx;

  // Gradiente da linha de temperatura: vermelho (quente) → verde (alvo) → azul (frio).
  const tgid = 't' + gid;
  const oSet = (1 - (setpoint - yLow) / yRange);
  let tempStops;
  if (oSet <= 0)      tempStops = '<stop offset="0%" stop-color="#3fb950"/><stop offset="100%" stop-color="#4aa8ff"/>';
  else if (oSet >= 1) tempStops = '<stop offset="0%" stop-color="#ff5b4a"/><stop offset="100%" stop-color="#3fb950"/>';
  else                tempStops = `<stop offset="0%" stop-color="#ff5b4a"/><stop offset="${(oSet*100).toFixed(1)}%" stop-color="#3fb950"/><stop offset="100%" stop-color="#4aa8ff"/>`;

  const xMaxPct = clamp(xAt(iMax)/VBW*100, 7, 82);
  const xMinPct = clamp(xAt(iMin)/VBW*100, 7, 82);

  // Cores dos rótulos de máx/mín: se a máxima não alcança o alvo, fica verde (em
  // vez de vermelho); se a mínima fica acima do alvo, verde (em vez de azul).
  const maxCol = (tMax < setpoint) ? '#3fb950' : '#ff5b4a';
  const minCol = (tMin > setpoint) ? '#3fb950' : '#4aa8ff';

  // Há chuva relevante no dia? (prob >30% e >0,5mm em alguma hora) → aviso ao lado do dia.
  const needRainAction = hours.some(h => h.pop > 30 && h.mm > 0.5);

  // Rótulos de hora compactos (de 3 em 3 h), só abaixo do dia de hoje.
  const x24 = (n) * (W / (n - 1));   // posição da 24h (extrapolada) = 00h do dia seguinte
  const hourAxis = isToday ? `
        <div class="hour-axis">
          ${hours.map((h, i) => {
            if (h.hour % 3 !== 0) return '';
            const pct = xAt(i) / VBW * 100;
            const style = i === 0
              ? 'left:0;transform:none'
              : `left:${pct.toFixed(1)}%;transform:translateX(-50%)`;
            return `<span style="${style}">${String(h.hour).padStart(2,'0')}h</span>`;
          }).join('')}
          <span style="left:${(x24/VBW*100).toFixed(1)}%;transform:translateX(-50%)" title="00h do dia seguinte">24h</span>
        </div>` : '';

  return `
    <div class="row${isToday ? ' today' : ''}">
      <div class="c-date">
        <span class="dow">${dow}</span>
        <span class="dnum">${dnum}</span>
        <span class="emo">${emo}</span>
        ${needRainAction ? `<span class="day-rain" title="${T().rainAction}">💧</span>` : ''}
      </div>
      <div class="c-chart">
        <div class="spark-wrap">
          <svg class="spark" viewBox="0 0 ${VBW} ${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="${tgid}" gradientUnits="userSpaceOnUse" x1="0" y1="${padT}" x2="0" y2="${(padT+ch).toFixed(1)}">
                ${tempStops}
              </linearGradient>
              ${rainDefsSvg}
            </defs>
            ${degLinesSvg}
            ${hourGrid}
            ${windBars}
            ${rainSvg}
            <path d="${linePath}" fill="none" stroke="url(#${tgid})" stroke-width="3"
                  vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
            ${windDot}
            <circle cx="${xAt(iMax).toFixed(1)}" cy="${yAt(tMax).toFixed(1)}" r="3" fill="${maxCol}"
                    vector-effect="non-scaling-stroke"/>
            <circle cx="${xAt(iMin).toFixed(1)}" cy="${yAt(tMin).toFixed(1)}" r="3" fill="${minCol}"
                    vector-effect="non-scaling-stroke"/>
          </svg>
          <span class="lbl lbl-max" style="${diag(xAt(iMax), yAt(tMax), false)};color:${maxCol}">▲ ${Math.round(tMax)}°</span>
          <span class="lbl lbl-min" style="${diag(xAt(iMin), yAt(tMin), true)};color:${minCol}">▼ ${Math.round(tMin)}°</span>
          ${windLbl}
          ${degAxis}
        </div>
        ${hourAxis}
      </div>
    </div>
  `;
}

function formatHr(h){ return String(h).padStart(2,'0') + 'h'; }
function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

/* Ícone do dia = clima prevalente entre 8h e 20h (sol, nuvem, nublado, chuva ou
   tempestade), pela maior frequência das categorias dos códigos WMO horários.
   Em empate, prevalece a categoria mais significativa (tempestade > chuva > …). */
function dominantDayCode(hours, dailyCode){
  const dayHrs = hours.filter(h => h.hour >= 8 && h.hour <= 20);
  const src = dayHrs.length ? dayHrs : hours;
  const cat = c => {
    if (c >= 95) return 'storm';
    if ((c >= 51 && c <= 67) || (c >= 80 && c <= 82)) return 'rain';
    if ((c >= 71 && c <= 77) || c === 85 || c === 86) return 'snow';
    if (c === 45 || c === 48) return 'fog';
    if (c === 3) return 'cloud';
    if (c === 2) return 'partly';
    return 'clear';                              // 0, 1
  };
  const counts = {};
  let maxMm = 0;
  src.forEach(h => { const k = cat(h.code); counts[k] = (counts[k] || 0) + 1; if ((h.mm||0) > maxMm) maxMm = h.mm; });
  // Tempestade tem prioridade: código diário de trovoada, qualquer hora de
  // trovoada no dia, ou chuva horária muito intensa (convectiva) → ⛈.
  if ((dailyCode != null && dailyCode >= 95) || (counts.storm || 0) >= 1 || maxMm >= 10) return 95;
  // senão, categoria mais frequente (empate → mais severa)
  const sev = ['clear','partly','cloud','fog','snow','rain'];
  let best = 'clear', bestN = 0;
  for (let i = sev.length - 1; i >= 0; i--) {
    const k = sev[i], c = counts[k] || 0;
    if (c > bestN) { bestN = c; best = k; }
  }
  const rep = { clear:0, partly:2, cloud:3, fog:45, rain:63, snow:73 };
  return rep[best];
}

/* Cor de uma temperatura na escala azul(frio)→verde(alvo)→vermelho(quente),
   coerente com o gradiente da linha. Retorna "r,g,b". */
function lerpRgb(a, b, t){
  return [Math.round(a[0]+(b[0]-a[0])*t), Math.round(a[1]+(b[1]-a[1])*t), Math.round(a[2]+(b[2]-a[2])*t)];
}
function tempColor(temp, setpoint, lo, hi){
  const COLD = [74,168,255], GREEN = [63,185,80], HOT = [255,91,74];
  let rgb;
  if (temp >= setpoint){
    const t = hi > setpoint ? clamp((temp - setpoint) / (hi - setpoint), 0, 1) : 0;
    rgb = lerpRgb(GREEN, HOT, t);
  } else {
    const t = setpoint > lo ? clamp((setpoint - temp) / (setpoint - lo), 0, 1) : 0;
    rgb = lerpRgb(GREEN, COLD, t);
  }
  return rgb.join(',');
}

/* Temperatura-alvo de interior conforme a estação ASTRONÔMICA da data (limites
   nos equinócios/solstícios ~20–21), com hemisfério pela latitude (negativa =
   Sul, estações invertidas): verão 24°, inverno 20°, primavera/outono 22°.
   Ex.: início de junho na Itália ainda é primavera (verão só a partir de ~21/06). */
function seasonSetpoint(dateISO, lat){
  const m = parseInt(dateISO.slice(5,7), 10);
  const d = parseInt(dateISO.slice(8,10), 10);
  const md = m * 100 + d;                        // ex.: 21/06 → 621
  let season;                                    // estação no Hemisfério Norte
  if      (md >= 320 && md <= 620) season = 'primavera';   // ~20/03 – 20/06
  else if (md >= 621 && md <= 922) season = 'verao';       // ~21/06 – 22/09
  else if (md >= 923 && md <= 1220) season = 'outono';     // ~23/09 – 20/12
  else                              season = 'inverno';    // ~21/12 – 19/03
  if (lat < 0) {                                 // Hemisfério Sul → inverte
    season = { inverno:'verao', verao:'inverno', primavera:'outono', outono:'primavera' }[season];
  }
  if (season === 'verao')   return 24;
  if (season === 'inverno') return 20;
  return 22;                                     // primavera e outono
}

function groupHours(hs){
  if (!hs.length) return '';
  const sorted = [...new Set(hs)].sort((a,b)=>a-b);
  const out = [];
  let s = sorted[0], p = sorted[0];
  for (let i = 1; i < sorted.length; i++){
    if (sorted[i] === p + 1) { p = sorted[i]; }
    else { out.push(s === p ? formatHr(s) : `${formatHr(s)}-${formatHr(p)}`); s = p = sorted[i]; }
  }
  out.push(s === p ? formatHr(s) : `${formatHr(s)}-${formatHr(p)}`);
  return out.join(' ');
}

function showError(msg){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('error').style.display = 'flex';
}
</script>
