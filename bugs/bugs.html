<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">
    
    <!-- SEO Meta Tags -->
    <title>Reportar Bug - Engenharia NATA</title>
    <meta name="description" content="Formulário para reportar bugs e problemas nos apps da Engenharia NATA">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/shared-styles.css?v=2.0.0">
    <link rel="stylesheet" href="../assets/css/v2-components.css?v=2.0.0">
    <link rel="stylesheet" href="bugs-styles.css?v=2.0.0">
</head>
<body>
    <!-- Seletor de Idioma -->
    <div class="language-selector">
        <button id="btnPortugues" class="lang-btn" data-lang="pt-BR" data-i18n-aria="aria.langPt" data-i18n-title="titles.langPt">
            <span class="flag" aria-hidden="true">🇧🇷</span>
            <span class="lang-text">PT</span>
        </button>
        <button id="btnItaliano" class="lang-btn" data-lang="it-IT" data-i18n-aria="aria.langIt" data-i18n-title="titles.langIt">
            <span class="flag" aria-hidden="true">🇮🇹</span>
            <span class="lang-text">IT</span>
        </button>
    </div>

    <div class="container">
        <!-- Cabeçalho -->
        <header>
            <h1 data-i18n="titulo">🐛 Reportar Bug</h1>
            <p class="subtitulo" data-i18n="descricao">Ajude-nos a melhorar reportando problemas encontrados</p>
        </header>

        <!-- Google Forms incorporado -->
        <section class="card bugs-form-embed-card">
            <h2 data-i18n="googleForms.titulo">📨 Envie seu relatório pelo Google Forms</h2>
            <p class="bugs-form-embed-desc" data-i18n="googleForms.descricao">Preencha o formulário abaixo. As respostas serão enviadas diretamente para sua base do Google Forms.</p>

            <div class="bugs-form-embed-wrap">
                <iframe
                    src="https://docs.google.com/forms/d/e/1FAIpQLSc3Qo7Otct-L7mN2qS9r967oBol6n6gnsEJz2nfkz89sSpBcQ/viewform?embedded=true"
                    width="640"
                    height="543"
                    frameborder="0"
                    marginheight="0"
                    marginwidth="0"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    title="Google Forms - Reportar Bug"
                >Caricamento…</iframe>
            </div>

            <p class="bugs-form-open-tab">
                <a
                    href="https://docs.google.com/forms/d/e/1FAIpQLSc3Qo7Otct-L7mN2qS9r967oBol6n6gnsEJz2nfkz89sSpBcQ/viewform"
                    target="_blank"
                    rel="noopener noreferrer"
                    data-i18n="googleForms.abrirNovaAba"
                >Abrir formulário em nova aba</a>
            </p>
        </section>
    </div>
    
    <footer>
        <p data-i18n="footer">💻 Reportar Bug - Engenharia Nata @ 2026</p>
    </footer>

    <!-- Botão de retorno à tela inicial -->
    <a href="../index.html" class="home-button-fixed" data-i18n-aria="aria.home">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <!-- Scripts Modulares ES6 -->
    <script type="module" src="bugs-script.js?v=2.0.0"></script>
</body>
</html>
