<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">
    
    <!-- SEO Meta Tags -->
    <title>Reportar Bug - Engenharia NATA</title>
    <meta name="description" content="Formulário para reportar bugs e problemas nos apps da Engenharia NATA">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/shared-styles.css?v=2.0.0">
    <link rel="stylesheet" href="../assets/css/v2-components.css?v=2.0.0">
    <link rel="stylesheet" href="bugs-styles.css?v=2.0.0">
</head>
<body>
    <!-- Seletor de Idioma -->
    <div class="language-selector">
        <button id="btnPortugues" class="lang-btn" data-lang="pt-BR" data-i18n-aria="aria.langPt" data-i18n-title="titles.langPt">
            <span class="flag" aria-hidden="true">🇧🇷</span>
            <span class="lang-text">PT</span>
        </button>
        <button id="btnItaliano" class="lang-btn" data-lang="it-IT" data-i18n-aria="aria.langIt" data-i18n-title="titles.langIt">
            <span class="flag" aria-hidden="true">🇮🇹</span>
            <span class="lang-text">IT</span>
        </button>
    </div>

    <div class="container">
        <!-- Cabeçalho -->
        <header>
            <h1 data-i18n="titulo">🐛 Reportar Bug</h1>
            <p class="subtitulo" data-i18n="descricao">Ajude-nos a melhorar reportando problemas encontrados</p>
        </header>

        <!-- Formulário -->
        <section class="card">
            <form id="bugForm">
                <!-- Categoria -->
                <div class="grupo-entrada">
                    <label data-i18n="formulario.categoria">Categoria</label>
                    <div class="v2-categoria-chips" id="categoriaChips">
                        <button type="button" class="v2-chip ativo" data-cat="bug" data-i18n="formulario.catBug">🐛 Bug</button>
                        <button type="button" class="v2-chip" data-cat="sugestao" data-i18n="formulario.catSugestao">💡 Sugestão</button>
                        <button type="button" class="v2-chip" data-cat="elogio" data-i18n="formulario.catElogio">⭐ Elogio</button>
                    </div>
                    <input type="hidden" id="categoriaInput" value="bug">
                </div>

                <!-- Descrição -->
                <div class="grupo-entrada">
                    <label for="bugDescription" data-i18n="formulario.descricao">Descrição *</label>
                    <textarea 
                        id="bugDescription" 
                        name="description" 
                        rows="6" 
                        required 
                        class="textarea-input"
                        placeholder="Descreva o problema encontrado, o que você estava fazendo quando ocorreu, e o que você esperava que acontecesse..."
                        data-i18n-placeholder="formulario.descricaoPlaceholder"></textarea>
                </div>

                <!-- Contato para resposta -->
                <div class="grupo-entrada">
                    <label for="bugContact" data-i18n="formulario.emailLabel">Contato (Opcional)</label>
                    <input 
                        type="email" 
                        id="bugContact" 
                        name="contact" 
                        class="input-text"
                        placeholder="seu@email.com"
                        data-i18n-placeholder="formulario.emailPlaceholder">
                    <p class="dica" data-i18n="formulario.emailDica">Informe seu email apenas se quiser receber resposta.</p>
                </div>

                <!-- Mensagem de status -->
                <div id="statusMessage" class="status-message" style="display: none;"></div>

                <!-- Botões -->
                <div class="form-buttons">
                    <button type="submit" class="btn-submit" data-i18n="formulario.enviar">
                        📤 Enviar Relatório
                    </button>
                    <a href="../index.html" class="btn-cancel" data-i18n="formulario.voltar">
                        ← Voltar
                    </a>
                </div>
            </form>
        </section>

        <!-- Histórico de Feedbacks -->
        <section class="card v2-historico-section">
            <div class="v2-historico-header" id="historicoToggle">
                <h3>
                    <span data-i18n="historico.titulo">Meus Relatórios</span>
                    <span id="historicoContador" class="v2-badge">0</span>
                </h3>
                <span class="v2-historico-toggle" id="historicoToggleIcon">▾</span>
            </div>
            <div class="v2-historico-lista escondido" id="historicoLista">
                <div class="v2-historico-vazio" id="historicoVazio" data-i18n="historico.vazio">Nenhum relatório enviado ainda.</div>
            </div>
            <button class="v2-export-btn" id="exportBtn" style="display:none" data-i18n="historico.exportar">
                ⬇ Exportar como JSON
            </button>
        </section>
    </div>
    
    <footer>
        <p data-i18n="footer">💻 Reportar Bug - Engenharia Nata @ 2026</p>
    </footer>

    <!-- Botão de retorno à tela inicial -->
    <a href="../index.html" class="home-button-fixed" data-i18n-aria="aria.home">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <!-- Scripts Modulares ES6 -->
    <script type="module" src="bugs-script.js?v=2.0.0"></script>
</body>
</html>
